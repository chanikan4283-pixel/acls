const SHIFTS=["morning","evening","night"];
const SH_LABEL={morning:"เช้า (08-16)",evening:"บ่าย (16-24)",night:"ดึก (00-08)"};
const SH_SHORT={morning:"เช้า",evening:"บ่าย",night:"ดึก"};

const LV_BG={R1:"#dbeafe",R2:"#dcfce7",R3:"#fef9c3"};
const LV_BD={R1:"#93c5fd",R2:"#86efac",R3:"#fde047"};
const LV_FG={R1:"#1e40af",R2:"#166534",R3:"#713f12"};
const STAFFING={morning:{min:2,max:3},evening:{min:2,max:3},night:{min:2,max:2}};
const STAFFING_EXT={evening:4,night:3}; // extended max — only used in Phase E4/N3 after morning is full
const STAFFING_FLEX={morning:{max:3},evening:{max:4}}; // evening expanded first if slot < min
const ROTATIONS=["วนใน","วนนอก","วนนอกครึ่งเดือนแรก","วนนอกครึ่งเดือนหลัง"];
const ROTATION_DEFAULTS={

const ROT_SHORT={"วนใน":"ใน","วนนอก":"นอก","วนนอกครึ่งเดือนแรก":"นอก½แรก","วนนอกครึ่งเดือนหลัง":"นอก½หลัง"};
// 20 distinct colors — index 0 = #B07AA1 (purple, reserved for เปมิกา)
const ALL_COLORS=[

  {bg:"#9C755F",bd:"#9C755F",fg:"#ffffff"}, // 8  brown
  {bg:"#BAB0AC",bd:"#BAB0AC",fg:"#1e293b"}, // 9  gray
  {bg:"#2F5597",bd:"#2F5597",fg:"#ffffff"}, // 10 navy
  {bg:"#7F8C3A",bd:"#7F8C3A",fg:"#ffffff"}, // 11 olive
  {bg:"#4ECDC4",bd:"#4ECDC4",fg:"#1e293b"}, // 12 aqua
  {bg:"#C06C84",bd:"#C06C84",fg:"#ffffff"}, // 13 mauve
  {bg:"#2D6A4F",bd:"#2D6A4F",fg:"#ffffff"}, // 14 dark green
  {bg:"#D4A017",bd:"#D4A017",fg:"#1e293b"}, // 15 gold
  {bg:"#6C5CE7",bd:"#6C5CE7",fg:"#ffffff"}, // 16 violet
  {bg:"#E5989B",bd:"#E5989B",fg:"#1e293b"}, // 17 rose

  {bg:"#5C6BC0",bd:"#5C6BC0",fg:"#ffffff"}, // 19 indigo
];

let _colorMap={};
function buildColorMap(physicians){
  _colorMap={};
  const used=new Set();
  // 1) Assign light purple (index 0) to เปมิกา (by name or id p3)
  const pemika=physicians.find(p=>p.name==="เปมิกา"||p.id==="p3");
  if(pemika){_colorMap[pemika.id]=ALL_COLORS[0];used.add(0);}
  // 2) Assign remaining colors sequentially, skipping used
  let ci=1;
  for(const p of physicians){
    if(_colorMap[p.id])continue;
    while(used.has(ci%ALL_COLORS.length))ci++;
    const idx=ci%ALL_COLORS.length;
    _colorMap[p.id]=ALL_COLORS[idx];
    used.add(idx);
    ci++;
  }
}
function physColor(id){return _colorMap[id]||ALL_COLORS[1];}
function physStyle(id){const c=physColor(id);return{backgroundColor:c.bg,borderColor:c.bd,color:c.fg};}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function uid(){return Math.random().toString(36).slice(2,9);}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function dateStr(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function fmtDate(ds){if(!ds)return'';const[y,m,d]=ds.split('-');return`${+d} ${MONTHS[+m-1]} ${+y+543}`;}
function isWeekend(ds){const d=new Date(ds);return d.getDay()===0||d.getDay()===6;}
function isChief(p){return p.level==="R2"||p.level==="R3";}
function loadLS(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// Collapse duplicate doctor records that share a NAME *or* an ID into one.
// Earlier list position = higher priority (local edits go first). The merge is
// LOSSLESS for day-off data: daysOff / shiftsOff / preferredShifts are UNIONED
// across every copy, so a day-off the user set on ANY duplicate is never thrown
// away (the old "keep-first" version silently dropped the other copy's daysOff,
// which is why a doctor could still be scheduled on a day they asked off).
// The survivor keeps a canonical "pN" id when one exists so that assignments
// already pointing at that id stay valid.
function dedupePhysByName(list){
  const recs=[];
  const byName=new Map(); // trimmed name -> index in recs
  const byId=new Map();   // id -> index in recs
  const isCanonical=id=>/^p\d+$/.test(id||"");
  const mergeInto=(t,p)=>{
    t.daysOff=Array.from(new Set([...(t.daysOff||[]),...(p.daysOff||[])]));
    t.shiftsOff=Array.from(new Set([...(t.shiftsOff||[]),...(p.shiftsOff||[])]));
    t.preferredShifts=Array.from(new Set([...(t.preferredShifts||[]),...(p.preferredShifts||[])]));
    // adopt a canonical id if the kept record doesn't already have one
    if(!isCanonical(t.id)&&isCanonical(p.id))t.id=p.id;
  };
  for(const p of (list||[])){
    const name=(p.name||"").trim();
    if(!name)continue;
    let idx=byName.has(name)?byName.get(name):(byId.has(p.id)?byId.get(p.id):-1);
    if(idx<0){
      const rec={...p,daysOff:[...(p.daysOff||[])],shiftsOff:[...(p.shiftsOff||[])],preferredShifts:[...(p.preferredShifts||[])]};
      idx=recs.length; recs.push(rec);
    }else{
      mergeInto(recs[idx],p);
    }
    // (re)point both maps at this record — id may have just become canonical
    byName.set(name,idx); byId.set(recs[idx].id,idx);
  }
  return recs;
}
// Re-point assignments that reference a removed duplicate doctor to the surviving
// record with the same name; drop assignments whose doctor no longer exists at all.
function remapAssignments(assignments,allKnownPhys,keptPhys){
  const nameById={}; (allKnownPhys||[]).forEach(p=>{nameById[p.id]=(p.name||"").trim();});
  const keptByName={}; keptPhys.forEach(p=>{keptByName[(p.name||"").trim()]=p;});
  const keptIds=new Set(keptPhys.map(p=>p.id));
  const out=[]; const dedup=new Set();
  for(const a of (assignments||[])){
    let pid=a.physicianId;
    if(!keptIds.has(pid)){
      const surv=keptByName[nameById[pid]||""];
      if(!surv)continue; // doctor deleted entirely — drop orphan shift
      pid=surv.id;
    }
    const key=pid+"|"+a.date+"|"+a.shiftType;
    if(dedup.has(key))continue; // same doctor can't hold the same slot twice
    dedup.add(key);
    out.push(pid===a.physicianId?a:{...a,physicianId:pid});
  }
  return out;
}

async function cloudGet(key) {
  if (!SCRIPT_URL) return null;
  try {
    const r = await fetch(`${SCRIPT_URL}?key=${key}`, {redirect:'follow'});
    const text = await r.text();
    return JSON.parse(text);
  } catch { return null; }
}
async function cloudSet(key, value) {
  if (!SCRIPT_URL) return;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({key, value}),
      redirect: 'follow',
    });
  } catch {}
}

// Returns true if doctor can ONLY work this shift today (e.g. วนนอก for evening)
function isRestrictedToShift(p,date,shift){
  return SHIFTS.filter(s=>s!==shift).every(s=>!isAvailableForSlot_raw(p,date,s));
}

// Blocked pairs (gap = 0 between shifts):
//   ดึก→เช้า same day, เช้า→บ่าย same day, บ่าย day N → ดึก day N+1
// Allowed 8เว้น8 (gap = 8hr):
//   เช้า→ดึก next day, ดึก→บ่าย same day, บ่าย→เช้า next day
function isConsecutiveConflict(existingShift,newShift){
  // evening blocks both morning and night; morning blocks evening; night blocks evening
  const blocks={morning:["evening"],evening:["morning","night"],night:["evening"]};
  return (blocks[existingShift]||[]).includes(newShift);
}
function hasImmediateConflict(physicianId,date,shiftType,assignments){
  const newR=shiftEpochRange(date,shiftType);
  return assignments.some(a=>{
    if(a.physicianId!==physicianId)return false;
    const r=shiftEpochRange(a.date,a.shiftType);
    return r.end===newR.start||newR.end===r.start; // exactly 0-hr gap
  });
}

/* ── Shift time helpers (epoch minutes) ──────────────────────── */
// ดึก of day N runs 00:00–08:00 of day N+1 (written on day N card, ends next morning)
// This correctly produces:
//   เช้า→บ่าย same day   : gap=0  → FORBIDDEN
//   บ่าย→ดึก same day    : gap=0  → FORBIDDEN  (บ่าย ends midnight = ดึก starts midnight)
//   ดึก→เช้า next day    : gap=0  → FORBIDDEN  (ดึก ends 08:00 day N+1 = เช้า day N+1 starts 08:00)
//   เช้า→ดึก same day    : gap=8h → ALLOWED
//   บ่าย→เช้า next day   : gap=8h → ALLOWED
//   ดึก→บ่าย next day    : gap=8h → ALLOWED
function shiftEpochRange(dateStr,shiftType){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dayStart=Date.UTC(y,m-1,d)/60000;
  if(shiftType==="morning") return{start:dayStart+8*60,  end:dayStart+16*60};  // 08:00-16:00
  if(shiftType==="evening") return{start:dayStart+16*60, end:dayStart+24*60};  // 16:00-24:00
  if(shiftType==="night")   return{start:dayStart+24*60, end:dayStart+32*60};  // 00:00-08:00 of day+1
  return{start:dayStart,end:dayStart};
}

/* ── Consecutive run length if a new shift were added ────────── */
function getRunLength(physicianId,date,shiftType,assignments){
  const mine=assignments.filter(a=>a.physicianId===physicianId);
  const ranges=mine.map(a=>shiftEpochRange(a.date,a.shiftType));
  const newRange=shiftEpochRange(date,shiftType);
  const ns=newRange.start,ne=newRange.end;

  const sorted=[...ranges,newRange].sort((a,b)=>a.start-b.start);
  const GAP=8*60;

  // Walk through clusters; for each element track which cluster it belongs to and cluster size
  // Two-pass: first assign cluster ids, then find cluster containing newRange
  const clusterOf=new Array(sorted.length).fill(0);
  let cid=0;
  clusterOf[0]=0;
  for(let i=1;i<sorted.length;i++){
    const gap=sorted[i].start-sorted[i-1].end;
    if(gap>GAP)cid++;
    clusterOf[i]=cid;
  }
  // Find cluster of newRange
  let targetCluster=-1;
  for(let i=0;i<sorted.length;i++){
    if(sorted[i].start===ns&&sorted[i].end===ne){targetCluster=clusterOf[i];break;}
  }
  if(targetCluster===-1)return 1;
  return clusterOf.filter(c=>c===targetCluster).length;
}

function isInVanNokPeriod(physician,date){
  const day=+date.slice(8);
  const rot=physician.rotation||"วนนอก";
  if(rot==="วนนอก")return true;
  if(rot==="วนนอกครึ่งเดือนแรก")return day<=15;   // วนนอก = first half 1-15
  if(rot==="วนนอกครึ่งเดือนหลัง")return day>15;   // วนนอก = second half 16-30
  return false;
}

// How many shifts in this doctor's วนนอก half so far
function vanNokHalfShiftCount(physicianId,date,assignments){
  const day=+date.slice(8);
  const [y,m]=date.split('-').map(Number);
  const prefix=`${y}-${String(m).padStart(2,'0')}`;
  return assignments.filter(a=>{
    if(a.physicianId!==physicianId)return false;
    if(!a.date.startsWith(prefix))return false;
    const d=+a.date.slice(8);
    return d>15===day>15;
  }).length;
}

// How many shifts this doctor has in the same calendar week (Mon–Sun)
function vanNokWeekShiftCount(physicianId,date,assignments){
  const d=new Date(date+'T00:00:00');
  const dow=d.getDay(); // 0=Sun
  const monOff=dow===0?-6:1-dow;
  const ws=new Date(d); ws.setDate(d.getDate()+monOff);
  const we=new Date(ws); we.setDate(ws.getDate()+6);
  const s=ws.toISOString().slice(0,10), e=we.toISOString().slice(0,10);
  return assignments.filter(a=>a.physicianId===physicianId&&a.date>=s&&a.date<=e).length;
}

// Evening 4th slot only allowed when morning already has 3 that day
function eveningFourthOK(date,shift,assignments){
  if(shift!=="evening")return true;
  const evCount=assignments.filter(a=>a.date===date&&a.shiftType==="evening").length;
  if(evCount<3)return true; // adding 1st–3rd evening: always OK
  return assignments.filter(a=>a.date===date&&a.shiftType==="morning").length>=3;
}

function isAvailableForSlot_raw(physician,date,shiftType){
  const day=+date.slice(8);
  const rot=physician.rotation||"วนนอก";
  if(rot==="วนนอก") return shiftType==="evening";
  if(rot==="วนนอกครึ่งเดือนแรก"){
    // วนนอก = days 1-15 (evening only), วนใน = days 16-30 (all shifts, priority)
    if(day<=15) return shiftType==="evening";
    return true;
  }
  if(rot==="วนนอกครึ่งเดือนหลัง"){
    // วนใน = days 1-15 (all shifts, priority), วนนอก = days 16-30 (evening only)
    if(day>15) return shiftType==="evening";
    return true;
  }
  return true; // วนใน: all shifts
}

function isAvailableForSlot(physician,date,shiftType){
  // Doctor explicitly blocked this exact shift on this date — treat like a day-off
  // (never overridden, not even by last-resort fill). Centralised here so every
  // phase respects it; previously Pass 3/4/5 and the morning/evening/night fill
  // phases omitted the shiftsOff check and could schedule a blocked shift.
  if((physician.shiftsOff||[]).includes(date+"_"+shiftType))return false;
  // วนนอก-period doctors never work weekends (Fri=5/Sat=6/Sun=0). Enforced here,
  // centrally, so EVERY scheduling phase that calls isAvailableForSlot — including
  // last-resort fill and rest-day clustering — respects it. (Previously this was an
  // inline check sprinkled across passes, and Pass 5 / clusterRestDays forgot it,
  // letting วนนอก doctors leak onto weekends even when inner doctors were free.)
  if(isInVanNokPeriod(physician,date)){
    const dow=new Date(date+'T00:00:00').getDay();
    if(dow===0||dow===5||dow===6)return false;
  }
  return isAvailableForSlot_raw(physician,date,shiftType);
}

function validateCanGenerate(physicians,year,month){
  const errors=[];
  if(!physicians.length)return["ยังไม่มีแพทย์ในระบบ"];
  const days=daysInMonth(year,month);
  for(let d=1;d<=days;d++){
    for(const shift of SHIFTS){
      const date=dateStr(year,month,d);
      const avail=physicians.filter(p=>
        isAvailableForSlot(p,date,shift)&&
        !(p.daysOff||[]).includes(date)&&!(p.shiftsOff||[]).includes(date+"_"+shift)&&
        (p.maxShifts||0)>0
      );
      if(avail.length<STAFFING[shift].min){
        errors.push(`วันที่ ${d} เวร${SH_SHORT[shift]}: แพทย์ไม่พอ (ต้องการ ${STAFFING[shift].min} คน มี ${avail.length} คน)`);
      }
    }
  }
  return errors;
}

function generateSchedule(physicians,year,month,existingAssignments){
  const errors=[];
  const warnings=[];
  // fixed = locked/manual assignments, BUT exclude any where the doctor now has a daysOff
  const physMap=Object.fromEntries(physicians.map(p=>[p.id,p]));
  const fixed=existingAssignments.filter(a=>{
    if(!a.isLocked&&!a.isManual)return false;
    const p=physMap[a.physicianId];
    if(!p)return false;
    if((p.daysOff||[]).includes(a.date))return false; // doctor now has day off — drop even if locked
    return true;
  });
  const newAssignments=[...fixed];
  const shiftCounts={};
  // Track per-shift-type counts for balanced morning/evening/night distribution
  const shiftTypeCounts={};
  physicians.forEach(p=>{
    shiftCounts[p.id]=fixed.filter(a=>a.physicianId===p.id).length;
    shiftTypeCounts[p.id]={morning:0,evening:0,night:0};
    fixed.forEach(a=>{if(a.physicianId===p.id&&shiftTypeCounts[p.id][a.shiftType]!==undefined)shiftTypeCounts[p.id][a.shiftType]++;});
  });

  const days=daysInMonth(year,month);
  for(let d=1;d<=days;d++){
    for(const shift of SHIFTS){
      const date=dateStr(year,month,d);
      const slotFixed=fixed.filter(a=>a.date===date&&a.shiftType===shift);
      const fixedPids=new Set(slotFixed.map(a=>a.physicianId));
      let chiefInSlot=slotFixed.some(a=>{const p=physicians.find(x=>x.id===a.physicianId);return p&&isChief(p);});
      const need=Math.max(0,STAFFING[shift].min-slotFixed.length);
      if(need===0)continue;

      let pool=physicians.filter(p=>
        !fixedPids.has(p.id)&&
        !(p.daysOff||[]).includes(date)&&
        !(p.shiftsOff||[]).includes(date+"_"+shift)&&
        (shiftCounts[p.id]||0)<(p.maxShifts||99)&&
        isAvailableForSlot(p,date,shift)&&
        // Hard block: forbidden 0-hr gaps (เช้า→บ่าย, ดึก→เช้า same day, บ่าย→ดึก cross-day)
        !hasImmediateConflict(p.id,date,shift,newAssignments)&&
        // Hard block: same-day consecutive conflict
        !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,shift))&&
        // Hard block: วนนอก period doctors cannot work weekends (Fri=5/Sat=6/Sun=0)
        !(isInVanNokPeriod(p,date)&&[0,5,6].includes(new Date(date+'T00:00:00').getDay()))&&
        // Hard cap: วนนอกครึ่งเดือน นอก period → max 4 shifts per entire 2-week half
        !((p.rotation==="วนนอกครึ่งเดือนแรก"||p.rotation==="วนนอกครึ่งเดือนหลัง")&&
          isInVanNokPeriod(p,date)&&vanNokHalfShiftCount(p.id,date,newAssignments)>=4)&&
        // Chain limit: 8h-rest chain ≤ 4 slots
        getRunLength(p.id,date,shift,newAssignments)<=4
      );

      // Sort: 0) CHIEF REQUIRED if slot has none — chiefs always sorted first until one is placed
      //       1) prefer doctors restricted to this shift  2) shift-type balance
      //       3) run soft penalty  4) fewer shifts vs target
      pool.sort((a,b)=>{
        // Rule 0: if no chief in slot yet, put chiefs first (hard requirement)
        if(!chiefInSlot){
          const aC=isChief(a)?0:1, bC=isChief(b)?0:1;
          if(aC!==bC)return aC-bC;
        }

        const aRes=isRestrictedToShift(a,date,shift)?0:1;
        const bRes=isRestrictedToShift(b,date,shift)?0:1;
        if(aRes!==bRes)return aRes-bRes;

        // Weekend soft-block for วนนอก: prefer not to assign on Fri(5)/Sat(6)/Sun(0)
        const dow=new Date(date+'T00:00:00').getDay();
        const isWEnd=(dow===0||dow===5||dow===6);
        if(isWEnd){
          const aIsOuter=(a.rotation==="วนนอก"||((a.rotation==="วนนอกครึ่งเดือนแรก")&&+date.slice(8)<=15)||((a.rotation==="วนนอกครึ่งเดือนหลัง")&&+date.slice(8)>15));
          const bIsOuter=(b.rotation==="วนนอก"||((b.rotation==="วนนอกครึ่งเดือนแรก")&&+date.slice(8)<=15)||((b.rotation==="วนนอกครึ่งเดือนหลัง")&&+date.slice(8)>15));
          if(aIsOuter!==bIsOuter)return aIsOuter?1:-1;
        }

        // Primary: shift-type relative balance
        const aTypeShares=shiftTypeCounts[a.id]||{morning:0,evening:0,night:0};
        const bTypeShares=shiftTypeCounts[b.id]||{morning:0,evening:0,night:0};
        const aTotal=(aTypeShares.morning||0)+(aTypeShares.evening||0)+(aTypeShares.night||0);
        const bTotal=(bTypeShares.morning||0)+(bTypeShares.evening||0)+(bTypeShares.night||0);
        const aRelDef=aTotal===0?0:(aTypeShares[shift]||0)/aTotal;
        const bRelDef=bTotal===0?0:(bTypeShares[shift]||0)/bTotal;
        if(Math.abs(aRelDef-bRelDef)>0.01)return aRelDef-bRelDef;

        // Consecutive run soft penalty
        const aRun=getRunLength(a.id,date,shift,newAssignments);
        const bRun=getRunLength(b.id,date,shift,newAssignments);
        if(aRun!==bRun){
          if(aRun>4&&bRun<=4)return 1;
          if(bRun>4&&aRun<=4)return -1;
          if(aRun>4&&bRun<=4)return 1;
          if(bRun>4&&aRun<=4)return -1;
        }

        // Penalize วนนอก-period doctors who already have many shifts in their วนนอก half
        const aVanNok=isInVanNokPeriod(a,date);
        const bVanNok=isInVanNokPeriod(b,date);
        if(aVanNok||bVanNok){
          const aHalf=aVanNok?vanNokHalfShiftCount(a.id,date,newAssignments):0;
          const bHalf=bVanNok?vanNokHalfShiftCount(b.id,date,newAssignments):0;
          // Soft cap: ครึ่งเดือน = 3 shifts in นอก half, วนนอก = 99 (no per-half cap)
          const cap=(r)=>(r==="วนนอกครึ่งเดือนแรก"||r==="วนนอกครึ่งเดือนหลัง")?3:99;
          if(aHalf>=cap(a.rotation)&&bHalf<cap(b.rotation))return 1;
          if(bHalf>=cap(b.rotation)&&aHalf<cap(a.rotation))return -1;
        }

        // Prefer ครึ่งเดือน doctors in their ใน-half (front-load shifts there)
        const aIsHalf=(a.rotation==="วนนอกครึ่งเดือนแรก"||a.rotation==="วนนอกครึ่งเดือนหลัง");
        const bIsHalf=(b.rotation==="วนนอกครึ่งเดือนแรก"||b.rotation==="วนนอกครึ่งเดือนหลัง");
        if((aIsHalf||bIsHalf)&&!isInVanNokPeriod({rotation:a.rotation},date)&&!isInVanNokPeriod({rotation:b.rotation},date)){
          // Both in ใน-period: prefer the one with more room before target
          const aRoom=(a.targetShifts||0)-(shiftCounts[a.id]||0);
          const bRoom=(b.targetShifts||0)-(shiftCounts[b.id]||0);
          if(Math.abs(aRoom-bRoom)>1)return bRoom-aRoom;
        }
        const aDiff=(shiftCounts[a.id]||0)-(a.targetShifts||0);
        const bDiff=(shiftCounts[b.id]||0)-(b.targetShifts||0);
        if(aDiff!==bDiff)return aDiff-bDiff;
        return (isChief(a)?0:1)-(isChief(b)?0:1);
      });

      let assigned=0;
      // Pass 1: respect chief-once rule
      for(const p of pool){
        if(assigned>=need)break;
        if(chiefInSlot&&isChief(p))continue;
        newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:shift,isLocked:false,isManual:false});
        shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
        if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][shift]=(shiftTypeCounts[p.id][shift]||0)+1;
        fixedPids.add(p.id);
        if(isChief(p))chiefInSlot=true;
        assigned++;
      }
      // Pass 2: relax chief-once if still under min
      if(assigned<need){
        for(const p of pool){
          if(assigned>=need)break;
          if(fixedPids.has(p.id))continue;
          newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:shift,isLocked:false,isManual:false});
          shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
          if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][shift]=(shiftTypeCounts[p.id][shift]||0)+1;
          fixedPids.add(p.id);
          assigned++;
        }
      }

      // Pass 3: relax soft run-length penalty (still block 0-hr gaps + maxShifts + availability)
      if(assigned<need){
        const pool3=physicians.filter(p=>
          !fixedPids.has(p.id)&&
          !(p.daysOff||[]).includes(date)&&
          (shiftCounts[p.id]||0)<(p.maxShifts||99)&&
          isAvailableForSlot(p,date,shift)&&
          !hasImmediateConflict(p.id,date,shift,newAssignments)&&
          !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,shift))&&
          // Hard block: วนนอก period doctors cannot work weekends (Fri=5/Sat=6/Sun=0)
          !(isInVanNokPeriod(p,date)&&[0,5,6].includes(new Date(date+'T00:00:00').getDay()))&&
          // Chain limit in Pass 3
          getRunLength(p.id,date,shift,newAssignments)<=4
        );
        pool3.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
        for(const p of pool3){
          if(assigned>=need)break;
          newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:shift,isLocked:false,isManual:false});
          shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
          if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][shift]=(shiftTypeCounts[p.id][shift]||0)+1;
          fixedPids.add(p.id);
          assigned++;
        }
      }

      // Pass 4: overflow — ignore maxShifts but still enforce chain limit and same-day conflicts
      if(assigned<need){
        const pool4=physicians.filter(p=>
          !fixedPids.has(p.id)&&
          !(p.daysOff||[]).includes(date)&&
          isAvailableForSlot(p,date,shift)&&
          !hasImmediateConflict(p.id,date,shift,newAssignments)&&
          !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,shift))&&
          getRunLength(p.id,date,shift,newAssignments)<=4
        );
        pool4.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
        for(const p of pool4){
          if(assigned>=need)break;
          newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:shift,isLocked:false,isManual:false});
          shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
          if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][shift]=(shiftTypeCounts[p.id][shift]||0)+1;
          fixedPids.add(p.id);
          assigned++;
        }
      }

      // Pass 5: absolute last resort — ignore chain limit (only block 0-hr gaps, ensure slot not empty)
      if(assigned<need){
        const pool5=physicians.filter(p=>
          !fixedPids.has(p.id)&&
          !(p.daysOff||[]).includes(date)&&
          isAvailableForSlot(p,date,shift)&&
          !hasImmediateConflict(p.id,date,shift,newAssignments)&&
          !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,shift))
        );
        pool5.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
        for(const p of pool5){
          if(assigned>=need)break;
          newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:shift,isLocked:false,isManual:false});
          shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
          if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][shift]=(shiftTypeCounts[p.id][shift]||0)+1;
          fixedPids.add(p.id);
          assigned++;
        }
      }

      const slotTotal=newAssignments.filter(a=>a.date===date&&a.shiftType===shift).length;
      if(slotTotal<STAFFING[shift].min){
        errors.push(`เวร${SH_SHORT[shift]}วันที่ ${d}: แพทย์ที่เหลือไม่พอ — ลองเพิ่มแพทย์ R1 หรือเพิ่ม Max เวร (ได้ ${slotTotal}/${STAFFING[shift].min} คน)`);
      }
    }
  }

  // ── Enforce: every filled slot must have ≥1 Chief (R2/R3) ─────────────
  for(let d=1;d<=days;d++){
    for(const shift of SHIFTS){
      const date=dateStr(year,month,d);
      const slotA=newAssignments.filter(a=>a.date===date&&a.shiftType===shift);
      if(slotA.length===0)continue;
      const hasChief=slotA.some(a=>{const p=physicians.find(x=>x.id===a.physicianId);return p&&isChief(p);});
      if(hasChief)continue;
      // Slot has no chief — add one (up to 3 per slot allowed)
      const existingPids=new Set(slotA.map(a=>a.physicianId));
      const chiefPool=physicians.filter(p=>
        isChief(p)&&
        !existingPids.has(p.id)&&
        !(p.daysOff||[]).includes(date)&&
        !(p.shiftsOff||[]).includes(date+"_"+shift)&&
        isAvailableForSlot(p,date,shift)&&
        !hasImmediateConflict(p.id,date,shift,newAssignments)
      );
      // No warning here — later fill/expansion/rest-clustering phases can still
      // change this slot. The FINAL chief-guarantee pass (after clusterRestDays)
      // owns the warning so we never double-report or warn about a slot that ends
      // up with a chief anyway.
      if(chiefPool.length===0)continue;
      chiefPool.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
      const chief=chiefPool[0];
      newAssignments.push({id:uid(),physicianId:chief.id,date,shiftType:shift,isLocked:false,isManual:false});
      shiftCounts[chief.id]=(shiftCounts[chief.id]||0)+1;
      if(shiftTypeCounts[chief.id])shiftTypeCounts[chief.id][shift]=(shiftTypeCounts[chief.id][shift]||0)+1;
    }
  }
  // ────────────────────────────────────────────────────────────────────────
  // Phase M3: fill ALL morning slots to 3 across the entire month FIRST
  for(let _d=1;_d<=days;_d++){
    const _date=dateStr(year,month,_d);
    if((physMap[_date]||newAssignments.filter(a=>a.date===_date&&a.shiftType==="morning").length)>=3)continue; // quick skip
    const _mCur=newAssignments.filter(a=>a.date===_date&&a.shiftType==="morning").length;
    if(_mCur>=3)continue;
    const _pool=physicians.filter(p=>
      !newAssignments.some(a=>a.date===_date&&a.shiftType==="morning"&&a.physicianId===p.id)&&
      !(p.daysOff||[]).includes(_date)&&
      (shiftCounts[p.id]||0)<(p.maxShifts||99)&&
      isAvailableForSlot(p,_date,"morning")&&
      !hasImmediateConflict(p.id,_date,"morning",newAssignments)&&
      !newAssignments.filter(a=>a.date===_date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,"morning"))&&
      !(isInVanNokPeriod(p,_date)&&[0,5,6].includes(new Date(_date+'T00:00:00').getDay()))&&
      getRunLength(p.id,_date,"morning",newAssignments)<=4
    );
    _pool.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
    for(const p of _pool){
      if(newAssignments.filter(a=>a.date===_date&&a.shiftType==="morning").length>=3)break;
      newAssignments.push({id:uid(),physicianId:p.id,date:_date,shiftType:"morning",isLocked:false,isManual:false});
      shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
      if(shiftTypeCounts[p.id])shiftTypeCounts[p.id]["morning"]=(shiftTypeCounts[p.id]["morning"]||0)+1;
    }
  }

  // ──────────────────────────────────────────────────────────────────────
  // For each doctor below their min, try to add them to available slots.
  // Preference order for extra slots: morning → evening (up to 3) → night (up to 2).
  const EXTRA_SHIFTS_ORDER=["morning","evening","night"];
  const MAX_PER_SLOT=3; // capped at 3 for evening, 2 for night until Phase E4/N3 runs

  let anyBelowMin=true;
  let safety=0;
  while(anyBelowMin&&safety++<15){
    anyBelowMin=false;
    // Sort doctors by deficit (most below min first)
    const underMin=physicians
      .filter(p=>(shiftCounts[p.id]||0)<(p.minShifts||0))
      .sort((a,b)=>((shiftCounts[a.id]||0)-(a.minShifts||0))-((shiftCounts[b.id]||0)-(b.minShifts||0)));

    for(const p of underMin){
      anyBelowMin=true;
      let added=false;
      // Try each day, prefer days where slot has fewest people (balance within slot too)
      const candidates=[];
      for(let d=1;d<=days;d++){
        const date=dateStr(year,month,d);
        if((p.daysOff||[]).includes(date))continue;
        for(const sh of EXTRA_SHIFTS_ORDER){
          if((p.shiftsOff||[]).includes(date+"_"+sh))continue;
          if(!isAvailableForSlot(p,date,sh))continue;
          if(hasImmediateConflict(p.id,date,sh,newAssignments))continue;
          if(newAssignments.some(a=>a.date===date&&a.shiftType===sh&&a.physicianId===p.id))continue;
          const slotCount=newAssignments.filter(a=>a.date===date&&a.shiftType===sh).length;
          if(slotCount>=(STAFFING[sh]?.max??2))continue;
          if((shiftCounts[p.id]||0)>=(p.maxShifts||99))continue;
          // Weekend block for วนนอก period
          if(isInVanNokPeriod(p,date)&&[0,5,6].includes(new Date(date+'T00:00:00').getDay()))continue;
          // Relax chain limit for underMin: allow up to 5 (instead of 4) when doctor is below min
          const deficit=(p.minShifts||0)-(shiftCounts[p.id]||0);
          const chainMax=deficit>=3?6:deficit>=1?5:4;
          if(getRunLength(p.id,date,sh,newAssignments)>chainMax)continue;
          candidates.push({date,sh,slotCount});
        }
      }
      if(candidates.length===0)continue;
      // Sort: pick shift type doctor has done least (balance เช้า/บ่าย/ดึก), prefer ใน-half for ครึ่งเดือน doctors
      const pTCu=shiftTypeCounts[p.id]||{morning:0,evening:0,night:0};
      const pTotu=(pTCu.morning||0)+(pTCu.evening||0)+(pTCu.night||0);
      const isHalfU=(p.rotation==="วนนอกครึ่งเดือนแรก"||p.rotation==="วนนอกครึ่งเดือนหลัง");
      candidates.sort((a,b)=>{
        // Strongly prefer shift type furthest below equal 1/3 share
        const aShare=pTotu===0?0:(pTCu[a.sh]||0)/pTotu;
        const bShare=pTotu===0?0:(pTCu[b.sh]||0)/pTotu;
        if(Math.abs(aShare-bShare)>0.05)return aShare-bShare;
        const aHas=pTCu[a.sh]||0,bHas=pTCu[b.sh]||0;
        if(aHas!==bHas)return aHas-bHas;
        // ครึ่งเดือน: strongly prefer ใน-half dates (front-load)
        if(isHalfU){
          const aInNok=isInVanNokPeriod(p,a.date),bInNok=isInVanNokPeriod(p,b.date);
          if(aInNok!==bInNok)return aInNok?1:-1;
        }
        return a.slotCount-b.slotCount||a.date.localeCompare(b.date);
      });
      const best=candidates[0];
      newAssignments.push({id:uid(),physicianId:p.id,date:best.date,shiftType:best.sh,isLocked:false,isManual:false});
      shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
      if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][best.sh]=(shiftTypeCounts[p.id][best.sh]||0)+1;
      added=true;
    }
    if(!anyBelowMin||!underMin.some(p=>(shiftCounts[p.id]||0)<(p.minShifts||0)))anyBelowMin=false;
  }
  // ────────────────────────────────────────────────────────────────────────


  // ── Toward-target loop: fill up to target (not just min) ────────────────
  // This ensures end-of-month slots get a 3rd doctor when available
  const TOWARD_TARGET_SHIFTS=["evening","morning","night"];
  for(let tIter=0;tIter<10;tIter++){
    let anyAdded=false;
    const belowTarget=physicians
      .filter(p=>(shiftCounts[p.id]||0)<(p.targetShifts||0))
      .sort((a,b)=>((shiftCounts[a.id]||0)-(a.targetShifts||0))-((shiftCounts[b.id]||0)-(b.targetShifts||0)));
    for(const p of belowTarget){
      const cands=[];
      for(let d=1;d<=days;d++){
        const date=dateStr(year,month,d);
        if((p.daysOff||[]).includes(date))continue;
        for(const sh of TOWARD_TARGET_SHIFTS){
          if(!isAvailableForSlot(p,date,sh))continue;
          if(hasImmediateConflict(p.id,date,sh,newAssignments))continue;
          if(newAssignments.some(a=>a.date===date&&a.shiftType===sh&&a.physicianId===p.id))continue;
          const slotCount=newAssignments.filter(a=>a.date===date&&a.shiftType===sh).length;
          if(slotCount>=STAFFING[sh].max)continue;
          if((shiftCounts[p.id]||0)>=(p.maxShifts||99))continue;
          if(isInVanNokPeriod(p,date)&&[0,5,6].includes(new Date(date+'T00:00:00').getDay()))continue;
          if((p.rotation==="วนนอกครึ่งเดือนแรก"||p.rotation==="วนนอกครึ่งเดือนหลัง")&&
             isInVanNokPeriod(p,date)&&vanNokHalfShiftCount(p.id,date,newAssignments)>=4)continue;
          if(getRunLength(p.id,date,sh,newAssignments)>4)continue;
          cands.push({date,sh,slotCount});
        }
      }
      if(cands.length===0)continue;
      const pTC=shiftTypeCounts[p.id]||{morning:0,evening:0,night:0};
      const pTot=(pTC.morning||0)+(pTC.evening||0)+(pTC.night||0);
      cands.sort((a,b)=>{
        const aShare=pTot===0?0:(pTC[a.sh]||0)/pTot;
        const bShare=pTot===0?0:(pTC[b.sh]||0)/pTot;
        if(Math.abs(aShare-bShare)>0.05)return aShare-bShare;
        const aHas=pTC[a.sh]||0,bHas=pTC[b.sh]||0;
        if(aHas!==bHas)return aHas-bHas;
        const isHalf=(p.rotation==="วนนอกครึ่งเดือนแรก"||p.rotation==="วนนอกครึ่งเดือนหลัง");
        if(isHalf){
          const aInNok=isInVanNokPeriod(p,a.date),bInNok=isInVanNokPeriod(p,b.date);
          if(aInNok!==bInNok)return aInNok?1:-1;
        }
        return a.slotCount-b.slotCount||a.date.localeCompare(b.date);
      });
      const best=cands[0];
      newAssignments.push({id:uid(),physicianId:p.id,date:best.date,shiftType:best.sh,isLocked:false,isManual:false});
      shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
      if(shiftTypeCounts[p.id])shiftTypeCounts[p.id][best.sh]=(shiftTypeCounts[p.id][best.sh]||0)+1;
      anyAdded=true;
    }
    if(!anyAdded)break;
  }
  // Phase E4: evening → 4 per slot (only on days where morning is already 3)
  for(let d=1;d<=days;d++){
    const date=dateStr(year,month,d);
    const morningFull=newAssignments.filter(a=>a.date===date&&a.shiftType==="morning").length>=3;
    if(!morningFull)continue;
    const evCur=newAssignments.filter(a=>a.date===date&&a.shiftType==="evening").length;
    if(evCur>=STAFFING_EXT.evening)continue;
    const pool=physicians.filter(p=>
      !newAssignments.some(a=>a.date===date&&a.shiftType==="evening"&&a.physicianId===p.id)&&
      !(p.daysOff||[]).includes(date)&&
      (shiftCounts[p.id]||0)<(p.maxShifts||99)&&
      isAvailableForSlot(p,date,"evening")&&
      !hasImmediateConflict(p.id,date,"evening",newAssignments)&&
      !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,"evening"))&&
      !(isInVanNokPeriod(p,date)&&[0,5,6].includes(new Date(date+'T00:00:00').getDay()))&&
      !((p.rotation==="วนนอกครึ่งเดือนแรก"||p.rotation==="วนนอกครึ่งเดือนหลัง")&&isInVanNokPeriod(p,date)&&vanNokHalfShiftCount(p.id,date,newAssignments)>=4)&&
      getRunLength(p.id,date,"evening",newAssignments)<=4
    );
    pool.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
    for(const p of pool){
      if(newAssignments.filter(a=>a.date===date&&a.shiftType==="evening").length>=STAFFING_EXT.evening)break;
      newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:"evening",isLocked:false,isManual:false});
      shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
      if(shiftTypeCounts[p.id])shiftTypeCounts[p.id]["evening"]=(shiftTypeCounts[p.id]["evening"]||0)+1;
    }
  }

  // Phase N3: night → 3 per slot (only on days where morning is already 3)
  for(let d=1;d<=days;d++){
    const date=dateStr(year,month,d);
    const morningFull=newAssignments.filter(a=>a.date===date&&a.shiftType==="morning").length>=3;
    if(!morningFull)continue;
    const niCur=newAssignments.filter(a=>a.date===date&&a.shiftType==="night").length;
    if(niCur>=STAFFING_EXT.night)continue;
    const pool=physicians.filter(p=>
      !newAssignments.some(a=>a.date===date&&a.shiftType==="night"&&a.physicianId===p.id)&&
      !(p.daysOff||[]).includes(date)&&
      (shiftCounts[p.id]||0)<(p.maxShifts||99)&&
      isAvailableForSlot(p,date,"night")&&
      !hasImmediateConflict(p.id,date,"night",newAssignments)&&
      !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,"night"))&&
      !(isInVanNokPeriod(p,date)&&[0,5,6].includes(new Date(date+'T00:00:00').getDay()))&&
      getRunLength(p.id,date,"night",newAssignments)<=4
    );
    pool.sort((a,b)=>(shiftCounts[a.id]||0)-(shiftCounts[b.id]||0));
    for(const p of pool){
      if(newAssignments.filter(a=>a.date===date&&a.shiftType==="night").length>=STAFFING_EXT.night)break;
      newAssignments.push({id:uid(),physicianId:p.id,date,shiftType:"night",isLocked:false,isManual:false});
      shiftCounts[p.id]=(shiftCounts[p.id]||0)+1;
      if(shiftTypeCounts[p.id])shiftTypeCounts[p.id]["night"]=(shiftTypeCounts[p.id]["night"]||0)+1;
    }
  }

  // Post-processing: cluster rest days into pairs
  clusterRestDays(physicians,newAssignments,year,month);

  // ── FINAL chief guarantee ───────────────────────────────────────────────
  // Runs LAST (after every fill/expansion/rest-clustering step) so nothing can
  // leave a slot chiefless behind our back. For each filled slot with no Chief:
  //   • if there is room (< slot max) → add a free chief
  //   • if the slot is full          → swap out a spare R1 (one with slack above
  //                                     their min) for a free chief
  //   • if no chief is free at all    → soft warning (surfaced to the user)
  for(let d=1;d<=days;d++){
    for(const shift of SHIFTS){
      const date=dateStr(year,month,d);
      const slotA=newAssignments.filter(a=>a.date===date&&a.shiftType===shift);
      if(slotA.length===0)continue;
      if(slotA.some(a=>{const p=physMap[a.physicianId];return p&&isChief(p);}))continue;
      const existingPids=new Set(slotA.map(a=>a.physicianId));
      const chiefPool=physicians.filter(p=>
        isChief(p)&&!existingPids.has(p.id)&&
        !(p.daysOff||[]).includes(date)&&
        !(p.shiftsOff||[]).includes(date+"_"+shift)&&
        isAvailableForSlot(p,date,shift)&&
        !hasImmediateConflict(p.id,date,shift,newAssignments)&&
        !newAssignments.filter(a=>a.date===date&&a.physicianId===p.id).map(a=>a.shiftType).some(s=>isConsecutiveConflict(s,shift))
      ).map(p=>({p,run:getRunLength(p.id,date,shift,newAssignments)}))
       .sort((a,b)=>a.run-b.run||(shiftCounts[a.p.id]||0)-(shiftCounts[b.p.id]||0));
      // Keep the 8เว้น8 chain within the relaxed bound (≤6): prefer a chief that
      // keeps it ≤4, else accept up to ≤6. If covering this slot would force a
      // chief past 6 consecutive (≈3+ days straight), leave it chiefless + warn
      // rather than overwork them.
      const pick=chiefPool.find(c=>c.run<=4)||chiefPool.find(c=>c.run<=6);
      if(!pick){
        warnings.push(`เวร${SH_SHORT[shift]}วันที่ ${d}: ไม่มี Chief (R2/R3) ในเวรนี้`);
        continue;
      }
      const chief=pick.p;
      const cap=STAFFING_EXT[shift]||STAFFING[shift].max; // morning 3, evening 4, night 3
      const addChief=()=>{
        newAssignments.push({id:uid(),physicianId:chief.id,date,shiftType:shift,isLocked:false,isManual:false});
        shiftCounts[chief.id]=(shiftCounts[chief.id]||0)+1;
        if(shiftTypeCounts[chief.id])shiftTypeCounts[chief.id][shift]=(shiftTypeCounts[chief.id][shift]||0)+1;
      };
      if(slotA.length<cap){ addChief(); continue; }
      // Slot full — swap out the most expendable non-chief (most shifts above min,
      // still strictly above min so we never push anyone below their minimum).
      const removable=slotA
        .filter(a=>!a.isLocked&&!a.isManual&&!isChief(physMap[a.physicianId]))
        .map(a=>({a,slack:(shiftCounts[a.physicianId]||0)-((physMap[a.physicianId]||{}).minShifts||0)}))
        .filter(x=>x.slack>0)
        .sort((x,y)=>y.slack-x.slack);
      if(removable.length===0){
        warnings.push(`เวร${SH_SHORT[shift]}วันที่ ${d}: ไม่มี Chief (R2/R3) ในเวรนี้`);
        continue;
      }
      const victim=removable[0].a;
      const vIdx=newAssignments.indexOf(victim);
      if(vIdx<0){ warnings.push(`เวร${SH_SHORT[shift]}วันที่ ${d}: ไม่มี Chief (R2/R3) ในเวรนี้`); continue; }
      newAssignments.splice(vIdx,1);
      shiftCounts[victim.physicianId]=(shiftCounts[victim.physicianId]||0)-1;
      if(shiftTypeCounts[victim.physicianId])shiftTypeCounts[victim.physicianId][shift]=Math.max(0,(shiftTypeCounts[victim.physicianId][shift]||0)-1);
      addChief();
    }
  }

  // HARD FINAL GUARD: strip every assignment where doctor has daysOff — no exceptions
  const finalAssignments=newAssignments.filter(a=>{
    const p=physMap[a.physicianId];
    return !p||(!(p.daysOff||[]).includes(a.date));
  });

  return{ok:errors.length===0,assignments:finalAssignments,errors,warnings};
}

/* ── Post-process: cluster isolated rest days ───────────────── */
function clusterRestDays(physicians,assignments,year,month){
  const days=daysInMonth(year,month);
  const monthPrefix=`${year}-${String(month).padStart(2,'0')}`;
  // Build per-doctor shift counts for the month
  const counts={};
  physicians.forEach(p=>{counts[p.id]=assignments.filter(a=>a.physicianId===p.id&&a.date.startsWith(monthPrefix)).length;});

  for(const p of physicians){
    const min=p.minShifts||0;
    const max=p.maxShifts||99;
    for(let d=2;d<days;d++){// skip first and last day (no neighbours)
      const ds=dateStr(year,month,d);
      const hasShift=assignments.some(a=>a.physicianId===p.id&&a.date===ds);
      if(hasShift)continue;// not a rest day
      const prev=dateStr(year,month,d-1);
      const next=dateStr(year,month,d+1);
      const hasPrev=assignments.some(a=>a.physicianId===p.id&&a.date===prev);
      const hasNext=assignments.some(a=>a.physicianId===p.id&&a.date===next);
      if(!hasPrev||!hasNext)continue;// not isolated

      // Try to move one adjacent shift to the other side
      // Prefer giving away 'next' shift if another doctor can absorb, giving p consecutive rest on d+1
      for(const neighbour of [prev,next]){
        const targetDay=neighbour===prev?next:prev;// we want targetDay to also become rest
        const shiftToMove=assignments.find(a=>a.physicianId===p.id&&a.date===neighbour&&!a.isLocked&&!a.isManual);
        if(!shiftToMove)continue;
        // Find a doctor who can take this shift
        const slotSh=shiftToMove.shiftType;
        const slotDate=shiftToMove.date;
        const alreadyThere=new Set(assignments.filter(a=>a.date===slotDate&&a.shiftType===slotSh).map(a=>a.physicianId));
        const candidates=physicians.filter(q=>
          q.id!==p.id&&
          !alreadyThere.has(q.id)&&
          !(q.daysOff||[]).includes(slotDate)&&
          !(q.shiftsOff||[]).includes(slotDate+"_"+slotSh)&&
          counts[q.id]<(q.maxShifts||99)&&
          isAvailableForSlot(q,slotDate,slotSh)&&
          counts[q.id]>=(q.minShifts||0)-1&&// don't pull from someone already below min
          !hasImmediateConflict(q.id,slotDate,slotSh,assignments)// no forbidden pairs
        );
        if(candidates.length===0)continue;
        // Pick candidate with fewest shifts
        candidates.sort((a,b)=>(counts[a.id]||0)-(counts[b.id]||0));
        const donor=candidates[0];
        // Check run wouldn't exceed 4
        const donorRun=getRunLength(donor.id,slotDate,slotSh,assignments);
        if(donorRun>4)continue;
        // Verify p won't drop below min
        if(counts[p.id]-1<min)continue;
        // Perform swap: remove p's assignment, add donor's
        const idx=assignments.indexOf(shiftToMove);
        if(idx<0)continue;
        assignments.splice(idx,1,{...shiftToMove,id:uid(),physicianId:donor.id,isManual:false});
        counts[p.id]--;
        counts[donor.id]=(counts[donor.id]||0)+1;
        break;// one swap per isolated rest day is enough
      }
    }
  }
}

/* ═══════════════════════════════════════════════
   UI PRIMITIVES
═══════════════════════════════════════════════ */
function Btn({children,onClick,variant="primary",size="md",className="",disabled=false,...rest}){
  const base="inline-flex items-center justify-center font-semibold rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed gap-1";
  const sizes={sm:"px-3 py-1 text-xs",md:"px-4 py-2 text-sm",lg:"px-5 py-2.5 text-base"};
  const variants={
    primary:"bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-400 shadow-sm",
    secondary:"bg-white text-slate-700 hover:bg-slate-50 focus:ring-slate-300 border border-slate-300 shadow-sm",
    danger:"bg-red-500 text-white hover:bg-red-600 focus:ring-red-400 shadow-sm",
    success:"bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-400 shadow-sm",
    ghost:"bg-transparent text-slate-600 hover:bg-slate-100 focus:ring-slate-300",
    amber:"bg-amber-500 text-white hover:bg-amber-600 focus:ring-amber-400 shadow-sm",
    purple:"bg-violet-600 text-white hover:bg-violet-700 focus:ring-violet-400 shadow-sm",
  };
  return(
    <button type="button" onClick={onClick} disabled={disabled}
      className={`${base} ${sizes[size]||sizes.md} ${variants[variant]||variants.primary} ${className}`} {...rest}>
      {children}
    </button>
  );
}

function Badge({children,color="blue"}){
  const map={
    blue:"bg-blue-100 text-blue-800 border border-blue-200",
    green:"bg-green-100 text-green-800 border border-green-200",
    yellow:"bg-yellow-100 text-yellow-800 border border-yellow-200",
    red:"bg-red-100 text-red-800 border border-red-200",
    gray:"bg-gray-100 text-gray-700 border border-gray-200",
    purple:"bg-purple-100 text-purple-800 border border-purple-200",
    orange:"bg-orange-100 text-orange-800 border border-orange-200",
    slate:"bg-slate-100 text-slate-700 border border-slate-200",
  };
  return<span className={`px-2 py-0.5 rounded-full text-xs font-semibold inline-block ${map[color]||map.blue}`}>{children}</span>;
}

function Card({children,className=""}){
  return<div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>{children}</div>;
}

function Inp({value,onChange,placeholder="",type="text",className="",...rest}){
  return<input type={type} value={value} onChange={onChange} placeholder={placeholder}
    className={`border border-slate-300 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white ${className}`} {...rest}/>;
}

function Field({label,children,className=""}){
  return(
    <div className={`mb-3 ${className}`}>
      <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide">{label}</label>
      {children}
    </div>
  );
}

function Modal({open,onClose,title,children,width="max-w-lg"}){
  useEffect(()=>{
    if(!open)return;
    const h=(e)=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[open,onClose]);
  if(!open)return null;
  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{background:"rgba(15,23,42,0.5)"}}>
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${width} max-h-[92vh] flex flex-col`}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-200 flex-shrink-0">
          <h2 className="text-lg font-bold text-slate-800">{title}</h2>
          <button type="button" onClick={onClose}
            className="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:text-slate-700 hover:bg-slate-100 text-xl font-light transition-colors">
            ×
          </button>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   DAYS OFF PICKER
═══════════════════════════════════════════════ */
function DaysOffPicker({year,month,selected,onChange,shiftsOff,onShiftsOffChange}){
  const days=daysInMonth(year,month);
  const firstDow=new Date(year,month-1,1).getDay();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const rows=[];
  for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));

  const safeShiftsOff=shiftsOff||[];
  function toggle(d){
    const ds=dateStr(year,month,d);
    onChange(selected.includes(ds)?selected.filter(x=>x!==ds):[...selected,ds]);
  }
  function toggleShiftOff(d,sh){
    const key=dateStr(year,month,d)+"_"+sh;
    if(onShiftsOffChange)onShiftsOffChange(safeShiftsOff.includes(key)?safeShiftsOff.filter(x=>x!==key):[...safeShiftsOff,key]);
  }

  const DOW=["อา","จ","อ","พ","พฤ","ศ","ส"];
  return(
    <div className="border border-slate-200 rounded-xl overflow-hidden select-none">
      <div className="grid grid-cols-7 bg-slate-50 border-b border-slate-200">
        {DOW.map((d,i)=>(
          <div key={d} className={`text-center text-xs font-bold py-2 ${i===0||i===6?"text-red-400":"text-slate-500"}`}>{d}</div>
        ))}
      </div>
      {rows.map((row,ri)=>(
        <div key={ri} className="grid grid-cols-7">
          {Array(7).fill(null).map((_,ci)=>{
            const d=row[ci]||null;
            if(!d)return<div key={ci} className="h-10 bg-slate-50/50"/>;
            const ds=dateStr(year,month,d);
            const off=selected.includes(ds);
            const we=isWeekend(ds);
            const shiftKeys={morning:ds+"_morning",evening:ds+"_evening",night:ds+"_night"};
            return(
              <div key={ci} className="border-t border-slate-100 flex flex-col items-center py-0.5">
                <button type="button" onClick={()=>toggle(d)}
                  className={`w-8 h-8 rounded-full text-sm font-semibold transition-all
                    ${off?"bg-red-500 text-white":"hover:bg-slate-100"}
                    ${we&&!off?"text-red-400":""}
                    ${!we&&!off?"text-slate-700":""}`}>
                  {d}
                </button>
                {off&&<span className="text-xs text-red-500 font-bold leading-none">หยุด</span>}
                <div className="flex gap-0.5 mt-0.5">
                  {[["ช","morning","#3b82f6"],["บ","evening","#f97316"],["ด","night","#7c3aed"]].map(([label,sh,color])=>{
                    const active=safeShiftsOff.includes(shiftKeys[sh]);
                    return(
                      <button key={sh} type="button" onClick={e=>{e.stopPropagation();toggleShiftOff(d,sh);}}
                        style={active?{backgroundColor:color,color:"#fff",border:`1px solid ${color}`}:{border:"1px solid #cbd5e1",color:"#64748b"}}
                        className="w-5 h-5 rounded text-xs font-bold leading-none flex items-center justify-center transition-all">
                        {label}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PHYSICIANS PAGE
═══════════════════════════════════════════════ */
function PhysiciansPage({physicians,setPhysicians,year,month,assignments,setAssignments}){
  const [modalOpen,setModalOpen]=useState(false);
  const [editId,setEditId]=useState(null);
  const [fName,setFName]=useState("");
  const [fLevel,setFLevel]=useState("R1");
  const [fRotation,setFRotation]=useState("วนนอก");
  const [fMin,setFMin]=useState(5);
  const [fTarget,setFTarget]=useState(7);
  const [fMax,setFMax]=useState(10);
  const [fDaysOff,setFDaysOff]=useState([]);
  const [fShiftsOff,setFShiftsOff]=useState([]);
  const [fPrefs,setFPrefs]=useState([]);

  function applyDefaults(rot,lv){
    const t=ROTATION_DEFAULTS[rot]?.[lv]||7;
    setFTarget(t);
    setFMin(Math.max(1,t-2));
    setFMax(t+3);
  }
  function handleRotChange(r){setFRotation(r);applyDefaults(r,fLevel);}
  function handleLvChange(l){setFLevel(l);applyDefaults(fRotation,l);}
  function togglePref(s){setFPrefs(pp=>pp.includes(s)?pp.filter(x=>x!==s):[...pp,s]);}

  function openAdd(){
    setEditId(null);setFName("");setFLevel("R1");setFRotation("วนนอก");
    applyDefaults("วนนอก","R1");setFDaysOff([]);setFShiftsOff([]);setFPrefs([]);setModalOpen(true);
  }
  function openEdit(p){
    setEditId(p.id);setFName(p.name);setFLevel(p.level);
    setFRotation(p.rotation||"วนนอก");setFMin(p.minShifts);
    setFTarget(p.targetShifts);setFMax(p.maxShifts);
    setFDaysOff(p.daysOff||[]);setFShiftsOff(p.shiftsOff||[]);setFPrefs(p.preferredShifts||[]);
    setModalOpen(true);
  }
  function handleDelete(id){
    if(window.confirm("ลบแพทย์คนนี้ออกจากระบบ?"))
      setPhysicians(prev=>prev.filter(p=>p.id!==id));
  }
  function handleSave(){
    if(!fName.trim())return;
    const name=fName.trim();
    // Adding a name that already exists must UPDATE that doctor, never create a
    // duplicate (two records of the same doctor = day-off lives on one while the
    // other keeps getting scheduled).
    const dup=!editId&&physicians.find(p=>(p.name||"").trim()===name);
    const targetId=editId||(dup?dup.id:uid());
    const obj={
      id:targetId,name,level:fLevel,rotation:fRotation,
      minShifts:+fMin,targetShifts:+fTarget,maxShifts:+fMax,
      daysOff:fDaysOff,shiftsOff:fShiftsOff,preferredShifts:fPrefs
    };
    if(editId||dup)setPhysicians(prev=>prev.map(p=>p.id===targetId?obj:p));
    else setPhysicians(prev=>[...prev,obj]);
    // Immediately remove any existing assignments on daysOff days — hard priority
    if(setAssignments){
      setAssignments(prev=>prev.filter(a=>
        a.physicianId!==targetId||!(fDaysOff||[]).includes(a.date)
      ));
    }
    setModalOpen(false);
  }

  const lvColor={R1:"blue",R2:"green",R3:"yellow"};
  const monthPrefix=`${year}-${String(month).padStart(2,'0')}`;

  return(
    <div className="p-4 max-w-5xl mx-auto">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">แพทย์ทั้งหมด</h1>
          <p className="text-sm text-slate-500 mt-0.5">{physicians.length} คนในระบบ</p>
        </div>
        <Btn onClick={openAdd} variant="primary">+ เพิ่มแพทย์</Btn>
      </div>
      <Card>
        {physicians.length===0?(
          <div className="py-16 text-center">
            <div className="text-6xl mb-4">👨‍⚕️</div>
            <div className="text-lg font-semibold text-slate-500">ยังไม่มีแพทย์ในระบบ</div>
            <div className="text-sm text-slate-400 mt-1">กดปุ่ม "เพิ่มแพทย์" เพื่อเริ่มต้นใช้งาน</div>
            <button type="button" onClick={openAdd}
              className="mt-4 px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition-colors">
              + เพิ่มแพทย์คนแรก
            </button>
          </div>
        ):(
          <div className="overflow-x-auto">
            <table className="w-full text-sm min-w-[700px]">
              <thead>
                <tr className="border-b-2 border-slate-200 bg-slate-50/80">
                  {["แพทย์","ระดับ","รูปแบบวน","Min","Target","Max","วันหยุด/เดือน",""].map((h,i)=>(
                    <th key={i} className={`px-4 py-3 font-bold text-slate-600 text-xs uppercase tracking-wide ${i>=3&&i<=5?"text-center":i===0?"text-left":"text-center"}`}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {physicians.map((p,i)=>{
                  const monthOff=(p.daysOff||[]).filter(d=>d.startsWith(monthPrefix)).length;
                  const col=physColor(p.id);
                  return(
                    <tr key={p.id} className={`border-b border-slate-100 hover:bg-blue-50/30 transition-colors ${i%2===1?"bg-slate-50/40":""}`}>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2.5">
                          <span className="w-3.5 h-3.5 rounded-full flex-shrink-0 shadow-sm"
                            style={{backgroundColor:col.bg,border:`2px solid ${col.bd}`}}/>
                          <span className="font-semibold text-slate-800">{p.name}</span>
                        </div>
                      </td>
                      <td className="px-4 py-3 text-center"><Badge color={lvColor[p.level]}>{p.level}</Badge></td>
                      <td className="px-4 py-3 text-center"><Badge color="purple">{ROT_SHORT[p.rotation||"วนนอก"]}</Badge></td>
                      <td className="px-4 py-3 text-center text-slate-600">{p.minShifts}</td>
                      <td className="px-4 py-3 text-center"><span className="font-bold text-blue-700">{p.targetShifts}</span></td>
                      <td className="px-4 py-3 text-center text-slate-600">{p.maxShifts}</td>
                      <td className="px-4 py-3 text-center">
                        <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${monthOff>0?"bg-red-100 text-red-700 border border-red-200":"bg-slate-100 text-slate-500 border border-slate-200"}`}>
                          {monthOff} วัน
                        </span>
                      </td>
                      <td className="px-4 py-3">
                        <div className="flex items-center justify-end gap-2">
                          <Btn size="sm" variant="secondary" onClick={()=>openEdit(p)}>✏ แก้ไข</Btn>
                          <Btn size="sm" variant="danger" onClick={()=>handleDelete(p.id)}>🗑</Btn>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>

      <Modal open={modalOpen} onClose={()=>setModalOpen(false)}
        title={editId?"✏ แก้ไขข้อมูลแพทย์":"+ เพิ่มแพทย์ใหม่"} width="max-w-2xl">
        <Field label="ชื่อ-นามสกุล">
          <Inp value={fName} onChange={e=>setFName(e.target.value)} placeholder="เช่น นพ.สมชาย ใจดี"/>
        </Field>
        <Field label="ระดับ (Level)">
          <div className="flex gap-2">
            {LEVELS.map(l=>(
              <button key={l} type="button" onClick={()=>handleLvChange(l)}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold border-2 transition-all ${fLevel===l?"shadow-md":"border-slate-200 text-slate-400 hover:border-slate-300"}`}
                style={fLevel===l?{backgroundColor:LV_BG[l],borderColor:LV_BD[l],color:LV_FG[l]}:{}}>
                {l}
              </button>
            ))}
          </div>
        </Field>
        <Field label="รูปแบบการวน">
          <div className="grid grid-cols-2 gap-2">
            {ROTATIONS.map(r=>(
              <button key={r} type="button" onClick={()=>handleRotChange(r)}
                className={`py-2.5 px-3 rounded-xl text-xs font-semibold border-2 transition-all text-left ${fRotation===r?"bg-violet-50 border-violet-400 text-violet-700 shadow-sm":"border-slate-200 text-slate-500 hover:border-slate-300 hover:bg-slate-50"}`}>
                {r}
              </button>
            ))}
          </div>
        </Field>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Min เวร"><Inp type="number" value={fMin} onChange={e=>setFMin(e.target.value)} min={0}/></Field>
          <Field label="Target เวร"><Inp type="number" value={fTarget} onChange={e=>setFTarget(e.target.value)} min={0}/></Field>
          <Field label="Max เวร"><Inp type="number" value={fMax} onChange={e=>setFMax(e.target.value)} min={0}/></Field>
        </div>
        <Field label="เวรที่ต้องการ">
          <div className="flex gap-5">
            {SHIFTS.map(s=>(
              <label key={s} className="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" checked={fPrefs.includes(s)} onChange={()=>togglePref(s)}
                  className="w-4 h-4 rounded accent-blue-600"/>
                <span className="text-sm font-medium text-slate-700 group-hover:text-blue-600">{SH_SHORT[s]}</span>
              </label>
            ))}
          </div>
        </Field>
        <Field label={`วันหยุด — ${MONTHS[month-1]} ${year+543}`}>
          <DaysOffPicker year={year} month={month} selected={fDaysOff} onChange={setFDaysOff}
  shiftsOff={fShiftsOff} onShiftsOffChange={setFShiftsOff}/>
          <p className="text-xs text-slate-500 mt-1.5">
            เลือก {fDaysOff.filter(d=>d.startsWith(`${year}-${String(month).padStart(2,'0')}`)).length} วันในเดือนนี้
            {fDaysOff.length>0&&` (รวม ${fDaysOff.length} วัน)`}
          </p>
        </Field>
        <div className="flex gap-2 pt-2 border-t border-slate-200 mt-2">
          <Btn onClick={handleSave} variant="primary" className="flex-1">💾 บันทึก</Btn>
          <Btn onClick={()=>setModalOpen(false)} variant="secondary">ยกเลิก</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STAFF PORTAL
═══════════════════════════════════════════════ */
function StaffPortal({physicians,setPhysicians,year,month}){
  const [selId,setSelId]=useState("");
  const [fDaysOff,setFDaysOff]=useState([]);
  const [fPrefs,setFPrefs]=useState([]);
  const [fRotation,setFRotation]=useState("วนนอก");
  const [saved,setSaved]=useState(false);

  const p=useMemo(()=>physicians.find(x=>x.id===selId),[selId,physicians]);

  useEffect(()=>{
    if(p){
      setFDaysOff(p.daysOff||[]);
      setFPrefs(p.preferredShifts||[]);
      setFRotation(p.rotation||"วนนอก");
    }
    setSaved(false);
  },[selId]);

  function handleSave(){
    setPhysicians(prev=>prev.map(x=>x.id===selId
      ?{...x,daysOff:fDaysOff,preferredShifts:fPrefs,rotation:fRotation}:x));
    setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  }
  function togglePref(s){setFPrefs(pp=>pp.includes(s)?pp.filter(x=>x!==s):[...pp,s]);}

  const lvColor={R1:"blue",R2:"green",R3:"yellow"};
  const monthPrefix=`${year}-${String(month).padStart(2,'0')}`;

  return(
    <div className="p-4 max-w-2xl mx-auto">
      <h1 className="text-2xl font-bold text-slate-800 mb-1">พอร์ทัลแพทย์</h1>
      <p className="text-sm text-slate-500 mb-5">แพทย์สามารถแก้ไขข้อมูลตนเองได้ที่นี่</p>
      <Card className="p-5">
        <Field label="เลือกแพทย์">
          <select value={selId} onChange={e=>setSelId(e.target.value)}
            className="border border-slate-300 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
            <option value="">-- เลือกชื่อแพทย์ --</option>
            {physicians.map(ph=><option key={ph.id} value={ph.id}>{ph.name} ({ph.level})</option>)}
          </select>
        </Field>

        {p&&(
          <>
            <div className="flex items-center gap-3 p-3 bg-gradient-to-r from-slate-50 to-blue-50 rounded-xl mb-4 border border-slate-200">
              <span className="w-5 h-5 rounded-full shadow-sm flex-shrink-0"
                style={{backgroundColor:physColor(p.id).bg,border:`2px solid ${physColor(p.id).bd}`}}/>
              <span className="font-bold text-slate-800">{p.name}</span>
              <Badge color={lvColor[p.level]}>{p.level}</Badge>
              <Badge color="purple">{ROT_SHORT[p.rotation||"วนนอก"]}</Badge>
            </div>

            <Field label="รูปแบบการวน">
              <div className="grid grid-cols-2 gap-2">
                {ROTATIONS.map(r=>(
                  <button key={r} type="button" onClick={()=>setFRotation(r)}
                    className={`py-2 px-3 rounded-xl text-xs font-semibold border-2 transition-all text-left ${fRotation===r?"bg-violet-50 border-violet-400 text-violet-700":"border-slate-200 text-slate-500 hover:border-slate-300"}`}>
                    {r}
                  </button>
                ))}
              </div>
            </Field>

            <Field label="เวรที่ต้องการ">
              <div className="flex gap-5">
                {SHIFTS.map(s=>(
                  <label key={s} className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={fPrefs.includes(s)} onChange={()=>togglePref(s)}
                      className="w-4 h-4 accent-blue-600"/>
                    <span className="text-sm font-medium">{SH_SHORT[s]}</span>
                  </label>
                ))}
              </div>
            </Field>

            <Field label={`วันหยุด — ${MONTHS[month-1]} ${year+543}`}>
              <DaysOffPicker year={year} month={month} selected={fDaysOff} onChange={setFDaysOff}/>
              <p className="text-xs text-slate-500 mt-1.5">
                เดือนนี้: {fDaysOff.filter(d=>d.startsWith(monthPrefix)).length} วันหยุด
              </p>
            </Field>

            <div className="flex gap-2 pt-2 border-t border-slate-200">
              <Btn onClick={handleSave} variant={saved?"success":"primary"} className="flex-1">
                {saved?"✓ บันทึกแล้ว":"💾 บันทึก"}
              </Btn>
            </div>
          </>
        )}
        {!selId&&(
          <div className="py-10 text-center text-slate-400">
            <div className="text-4xl mb-3">👤</div>
            <div className="text-sm">เลือกชื่อแพทย์เพื่อดูและแก้ไขข้อมูล</div>
          </div>
        )}
      </Card>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   CHIP MENU
═══════════════════════════════════════════════ */
function ChipMenu({x,y,assignment,physician,physicians,assignments,setAssignments,onClose}){
  const ref=useRef(null);
  const [hoverMove,setHoverMove]=useState(false);

  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    document.addEventListener("mousedown",h,true);
    return()=>document.removeEventListener("mousedown",h,true);
  },[onClose]);

  // viewport clamp
  const cx=Math.min(x,window.innerWidth-230);
  const cy=Math.min(y,window.innerHeight-220);
  const outsideRot=physician&&!isAvailableForSlot(physician,assignment.date,assignment.shiftType);

  function doMove(shift){
    if(shift===assignment.shiftType){onClose();return;}
    setAssignments(prev=>prev.map(a=>a.id===assignment.id?{...a,shiftType:shift,isManual:true}:a));
    onClose();
  }
  function doRemove(){
    setAssignments(prev=>prev.filter(a=>a.id!==assignment.id));
    onClose();
  }

  return(
    <div ref={ref} className="popup" style={{left:cx,top:cy}}>
      <div className="px-3 py-2.5 border-b border-slate-100">
        <div className="flex items-center gap-1.5">
          {outsideRot&&<span className="text-amber-500 text-sm">⚠</span>}
          {assignment.isManual&&<span title="แก้ไขด้วยตนเอง (ล็อค)" className="text-sm">🔒</span>}
          <span className="font-bold text-sm text-slate-800">{physician?.name}</span>
          <Badge color={{R1:"blue",R2:"green",R3:"yellow"}[physician?.level]}>{physician?.level}</Badge>
        </div>
        <div className="text-xs text-slate-500 mt-0.5">{fmtDate(assignment.date)} · {SH_SHORT[assignment.shiftType]}</div>
        {outsideRot&&<div className="text-xs text-amber-600 mt-0.5 bg-amber-50 px-1.5 py-0.5 rounded">⚠ นอกรูปแบบ ({physician?.rotation})</div>}
      </div>
      <div className="p-1">
        <div className="relative"
          onMouseEnter={()=>setHoverMove(true)} onMouseLeave={()=>setHoverMove(false)}>
          <button type="button"
            className="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-slate-50 flex items-center justify-between text-slate-700">
            <span>↔ ย้ายไปเวร…</span>
            <span className="text-slate-400 text-xs">›</span>
          </button>
          {hoverMove&&(
            <div className="absolute left-full top-0 ml-1 bg-white border border-slate-200 rounded-xl shadow-xl py-1"
              style={{minWidth:150,zIndex:9001}}>
              {SHIFTS.filter(s=>s!==assignment.shiftType).map(s=>(
                <button key={s} type="button" onClick={()=>doMove(s)}
                  className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 hover:text-blue-700 transition-colors">
                  {SH_LABEL[s]}
                </button>
              ))}
            </div>
          )}
        </div>
        <button type="button" onClick={doRemove}
          className="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-red-50 text-red-600 font-medium">
          ✕ ลบออกจากเวร
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ADD SLOT MENU
═══════════════════════════════════════════════ */
function AddSlotMenu({x,y,date,shift,physicians,assignments,setAssignments,onClose}){
  const ref=useRef(null);
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    document.addEventListener("mousedown",h,true);
    return()=>document.removeEventListener("mousedown",h,true);
  },[onClose]);

  const cx=Math.min(x,window.innerWidth-250);
  const cy=Math.min(y,window.innerHeight-350);

  const inSlot=new Set(assignments.filter(a=>a.date===date&&a.shiftType===shift).map(a=>a.physicianId));
  const available=physicians.filter(p=>!inSlot.has(p.id)&&!(p.daysOff||[]).includes(date));
  const inside=available.filter(p=>isAvailableForSlot(p,date,shift));
  const outside=available.filter(p=>!isAvailableForSlot(p,date,shift));

  function addPhys(p){
    setAssignments(prev=>[...prev,{id:uid(),physicianId:p.id,date,shiftType:shift,isLocked:false,isManual:true}]);
    onClose();
  }

  const lvColor={R1:"blue",R2:"green",R3:"yellow"};
  const PhysRow=({p,warn})=>(
    <button type="button" onClick={()=>addPhys(p)}
      className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-blue-50 transition-colors`}>
      <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor:physColor(p.id).bg}}/>
      <span className="flex-1 font-medium truncate">{p.name}</span>
      <Badge color={lvColor[p.level]}>{p.level}</Badge>
      {warn&&<span className="text-amber-500 text-xs">⚠</span>}
    </button>
  );

  return(
    <div ref={ref} className="popup" style={{left:cx,top:cy,maxHeight:340,overflowY:"auto"}}>
      <div className="px-3 py-2 border-b border-slate-100 bg-slate-50 rounded-t-[10px] sticky top-0">
        <div className="text-xs font-bold text-slate-600">{fmtDate(date)}</div>
        <div className="text-xs text-slate-500">{SH_LABEL[shift]}</div>
      </div>
      {available.length===0&&(
        <div className="p-4 text-center text-xs text-slate-400">ไม่มีแพทย์ว่างสำหรับเวรนี้</div>
      )}
      {inside.map(p=><PhysRow key={p.id} p={p} warn={false}/>)}
      {outside.length>0&&(
        <>
          <div className="px-3 py-1 text-xs font-bold text-amber-600 bg-amber-50 border-t border-amber-100">
            ⚠ นอกรูปแบบการวน
          </div>
          {outside.map(p=><PhysRow key={p.id} p={p} warn={true}/>)}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ACTIVITY MENU
═══════════════════════════════════════════════ */
const ACT_TYPES=["Holiday","Meeting","Training","Note"];
const ACT_TYPE_TH={Holiday:"วันหยุด",Meeting:"ประชุม",Training:"อบรม",Note:"หมายเหตุ"};
const ACT_COLORS=["#ef4444","#3b82f6","#10b981","#f59e0b","#8b5cf6"];

function ActivityMenu({x,y,date,activities,setActivities,onClose}){
  const ref=useRef(null);
  const [form,setForm]=useState(null); // null=list, {id?,title,type,color}=editing

  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    document.addEventListener("mousedown",h,true);
    return()=>document.removeEventListener("mousedown",h,true);
  },[onClose]);

  const cx=Math.min(x,window.innerWidth-270);
  const cy=Math.min(y,window.innerHeight-400);
  const dayActs=activities.filter(a=>a.date===date);

  function startAdd(){setForm({title:"",type:"Note",color:"#f59e0b"});}
  function startEdit(a){setForm({id:a.id,title:a.title,type:a.type,color:a.color});}
  function handleSave(){
    if(!form.title.trim())return;
    if(form.id){
      setActivities(prev=>prev.map(a=>a.id===form.id?{...a,...form}:a));
    }else{
      setActivities(prev=>[...prev,{id:uid(),date,...form}]);
    }
    setForm(null);
  }
  function handleDelete(id){setActivities(prev=>prev.filter(a=>a.id!==id));}

  return(
    <div ref={ref} className="popup" style={{left:cx,top:cy,minWidth:265}}>
      <div className="px-3 py-2 border-b border-slate-100 bg-slate-50 rounded-t-[10px] flex items-center justify-between">
        <span className="text-xs font-bold text-slate-600">{fmtDate(date)}</span>
        {!form&&(
          <button type="button" onClick={startAdd}
            className="text-xs text-blue-600 font-bold hover:underline">+ เพิ่ม</button>
        )}
      </div>

      {!form&&(
        <>
          {dayActs.length===0&&(
            <div className="p-4 text-center text-xs text-slate-400">ยังไม่มีกิจกรรม</div>
          )}
          {dayActs.map(a=>(
            <div key={a.id} className="flex items-center gap-2 px-3 py-2 border-b border-slate-50 hover:bg-slate-50">
              <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor:a.color}}/>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold truncate">{a.title}</div>
                <div className="text-xs text-slate-400">{ACT_TYPE_TH[a.type]||a.type}</div>
              </div>
              <button type="button" onClick={()=>startEdit(a)}
                className="text-slate-400 hover:text-blue-500 text-xs p-1">✏</button>
              <button type="button" onClick={()=>handleDelete(a.id)}
                className="text-slate-400 hover:text-red-500 text-xs p-1">✕</button>
            </div>
          ))}
        </>
      )}

      {form&&(
        <div className="p-3">
          <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
            placeholder="ชื่อกิจกรรม"
            className="border border-slate-300 rounded-lg px-2 py-1.5 text-sm w-full mb-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          <div className="flex flex-wrap gap-1 mb-2.5">
            {ACT_TYPES.map(t=>(
              <button key={t} type="button" onClick={()=>setForm(f=>({...f,type:t}))}
                className={`px-2 py-0.5 rounded-lg text-xs font-semibold border transition-all ${form.type===t?"bg-blue-100 border-blue-400 text-blue-700":"border-slate-200 text-slate-500 hover:border-slate-300"}`}>
                {ACT_TYPE_TH[t]}
              </button>
            ))}
          </div>
          <div className="flex gap-2 mb-3 items-center">
            <span className="text-xs text-slate-500">สี:</span>
            {ACT_COLORS.map(c=>(
              <button key={c} type="button" onClick={()=>setForm(f=>({...f,color:c}))}
                className="w-6 h-6 rounded-full transition-transform hover:scale-110"
                style={{backgroundColor:c,outline:form.color===c?"3px solid #334155":"2px solid transparent",outlineOffset:1}}/>
            ))}
          </div>
          <div className="flex gap-2">
            <button type="button" onClick={handleSave}
              className="flex-1 bg-blue-600 text-white py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700">
              บันทึก
            </button>
            <button type="button" onClick={()=>setForm(null)}
              className="px-3 text-xs py-1.5 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50">
              ยกเลิก
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MONTHLY CALENDAR
═══════════════════════════════════════════════ */
const SHIFT_BG={morning:"#eff6ff",evening:"#f0fdf4",night:"#faf5ff"};
const SHIFT_BD={morning:"#bfdbfe",evening:"#bbf7d0",night:"#e9d5ff"};
const DOW_LABELS=["อา","จ","อ","พ","พฤ","ศ","ส"];

function MonthlyCalendar({year,month,physicians,assignments,setAssignments,activities,setActivities,highlightPid,readOnly}){
  const [menu,setMenu]=useState(null);
  const days=daysInMonth(year,month);
  const firstDow=new Date(year,month-1,1).getDay();
  const today=new Date();
  const todayStr=dateStr(today.getFullYear(),today.getMonth()+1,today.getDate());

  function closeMenu(){setMenu(null);}

  function onChipClick(e,a,phys){
    if(readOnly)return;
    e.stopPropagation();
    const x=Math.min(e.clientX,window.innerWidth-240);
    const y=Math.min(e.clientY+4,window.innerHeight-240);
    setMenu({type:"chip",x,y,assignment:a,physician:phys});
  }
  function onAddClick(e,date,shift){
    if(readOnly)return;
    e.stopPropagation();
    const x=Math.min(e.clientX,window.innerWidth-260);
    const y=Math.min(e.clientY+4,window.innerHeight-360);
    setMenu({type:"add",x,y,date,shift});
  }
  function onActClick(e,date){
    e.stopPropagation();
    const x=Math.min(e.clientX,window.innerWidth-280);
    const y=Math.min(e.clientY+4,window.innerHeight-420);
    setMenu({type:"act",x,y,date});
  }

  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const rows=[];
  for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));

  return(
    <div>
      {/* Day headers */}
      <div className="grid grid-cols-7 border-b border-slate-200 bg-slate-50">
        {DOW_LABELS.map((d,i)=>(
          <div key={d} className={`text-center py-2 text-xs font-bold ${i===0||i===6?"text-red-500":"text-slate-500"}`}>{d}</div>
        ))}
      </div>

      {/* Rows */}
      {rows.map((row,ri)=>(
        <div key={ri} className="grid grid-cols-7">
          {row.map((d,ci)=>{
            if(!d){
              return<div key={ci} className="border-r border-b border-slate-200 bg-slate-50/60" style={{minHeight:145}}/>;
            }
            const ds=dateStr(year,month,d);
            const isWE=isWeekend(ds);
            const isTod=ds===todayStr;
            const dayActs=activities.filter(a=>a.date===ds);
            const cellClass=`border-r border-b border-slate-200 p-1.5 ${isWE?"bg-rose-50/40":"bg-white"} ${isTod?"ring-2 ring-inset ring-blue-500 ring-opacity-70":""}`;
            return(
              <div key={ci} className={cellClass} style={{minHeight:145}}>
                {/* Date number row */}
                <div className="flex items-center justify-between mb-1">
                  <span className={`text-xs font-bold leading-none
                    ${isWE?"text-red-500":"text-slate-700"}
                    ${isTod?"bg-blue-600 text-white w-5 h-5 rounded-full flex items-center justify-center":""}`}>
                    {d}
                  </span>
                </div>

                {/* Shifts */}
                {SHIFTS.map(sh=>{
                  const slotA=assignments.filter(a=>a.date===ds&&a.shiftType===sh).filter(a=>{
                    const phys=physicians.find(p=>p.id===a.physicianId);
                    return !phys||!(phys.daysOff||[]).includes(ds);
                  });
                  const cnt=slotA.length;
                  const minR=STAFFING[sh].min;
                  const under=cnt>0&&cnt<minR;
                  const empty=cnt===0;
                  return(
                    <div key={sh} className="mb-1 rounded-lg overflow-hidden"
                      style={{background:SHIFT_BG[sh],border:`1px solid ${under?"#fca5a5":SHIFT_BD[sh]}`}}>
                      <div className="flex items-center justify-between px-1.5 pt-0.5">
