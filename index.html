                        <span style={{fontSize:8,fontWeight:800,color:"#64748b",letterSpacing:"0.03em"}}>{SH_SHORT[sh]}</span>
                        <span style={{fontSize:7,color:under||empty?"#ef4444":"#94a3b8",fontWeight:600}}>
                          {cnt}/{minR}
                        </span>
                      </div>
                      <div className="flex flex-wrap px-0.5 pb-0.5 gap-0">
                        {slotA.map(a=>{
                          const phys=physicians.find(p=>p.id===a.physicianId);
                          if(!phys)return null;
                          const dim=!!(highlightPid&&highlightPid!==phys.id);
                          const outside=!isAvailableForSlot(phys,ds,sh);
                          return(
                            <span key={a.id} className="chip"
                              style={{...physStyle(phys.id),opacity:dim?0.25:1,
                                outline:outside?"2px solid #f59e0b":"none",outlineOffset:0}}
                              onClick={e=>onChipClick(e,a,phys)}
                              title={`${phys.name}${outside?" (⚠ นอกรูปแบบ)":""}`}>
                              {outside&&<span style={{fontSize:8,marginRight:1}}>⚠</span>}
                              {a.isManual&&<span style={{fontSize:8,marginRight:1}}>🔒</span>}
                              {phys.level} {phys.name.replace(/^(นพ\.|พญ\.)\s*/,'')}
                            </span>
                          );
                        })}
                        {!readOnly&&(
                          <button type="button" onClick={e=>onAddClick(e,ds,sh)}
                            className="chip"
                            style={{backgroundColor:"transparent",borderColor:"#cbd5e1",
                              color:"#94a3b8",borderStyle:"dashed",fontSize:9,padding:"1px 5px"}}
                            title="เพิ่มแพทย์">
                            + เพิ่ม
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}

                {/* Activities */}
                {dayActs.map(a=>(
                  <div key={a.id} className="flex items-center gap-1 rounded px-1 mb-0.5 cursor-pointer"
                    style={{background:a.color+"22",border:`1px solid ${a.color}55`}}
                    onClick={e=>onActClick(e,ds)}>
                    <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{backgroundColor:a.color}}/>
                    <span style={{fontSize:8,color:a.color,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                      title={a.title}>{a.title}</span>
                  </div>
                ))}
                {/* Always-visible activity add chip */}
                {!readOnly&&(
                  <button type="button" onClick={e=>onActClick(e,ds)}
                    title="เพิ่มกิจกรรม"
                    className="mt-0.5 w-full flex items-center justify-center gap-0.5 rounded-md font-bold transition-all hover:opacity-80 active:scale-95"
                    style={{fontSize:9,padding:"2px 4px",background:"#10b981",border:"none",color:"#fff",letterSpacing:"0.02em"}}>
                    + กิจกรรม
                  </button>
                )}
              </div>
            );
          })}
        </div>
      ))}

      {/* Popups */}
      {menu?.type==="chip"&&(
        <ChipMenu x={menu.x} y={menu.y} assignment={menu.assignment} physician={menu.physician}
          physicians={physicians} assignments={assignments} setAssignments={setAssignments} onClose={closeMenu}/>
      )}
      {menu?.type==="add"&&(
        <AddSlotMenu x={menu.x} y={menu.y} date={menu.date} shift={menu.shift}
          physicians={physicians} assignments={assignments} setAssignments={setAssignments} onClose={closeMenu}/>
      )}
      {menu?.type==="act"&&(
        <ActivityMenu x={menu.x} y={menu.y} date={menu.date}
          activities={activities} setActivities={setActivities} onClose={closeMenu}/>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCHEDULE PAGE
═══════════════════════════════════════════════ */
function SchedulePage({physicians,year,month,setYear,setMonth,assignments,setAssignments,activities,setActivities}){
  const [errors,setErrors]=useState([]);
  const [genMsg,setGenMsg]=useState("");
  const [generating,setGenerating]=useState(false);

  function prevMonth(){
    if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1);
  }
  function nextMonth(){
    if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1);
  }

  function handleGenerate(){
    const errs=validateCanGenerate(physicians,year,month);
    if(errs.length){setErrors(errs);setGenMsg("");return;}
    setErrors([]);setGenerating(true);
    setTimeout(()=>{
      try{
        const res=generateSchedule(physicians,year,month,assignments);
        // Extra safety: strip any assignment where the doctor has a daysOff (belt-and-suspenders)
        const physById=Object.fromEntries(physicians.map(p=>[p.id,p]));
        const safeAssignments=res.assignments.filter(a=>{
          const ph=physById[a.physicianId];
          return !ph||!(ph.daysOff||[]).includes(a.date);
        });
        setAssignments(safeAssignments);
        // Check daysOff-aware staffing warnings
        const daysInM=daysInMonth(year,month);
        const daysOffWarnings=[];
        for(let d=1;d<=daysInM;d++){
          const ds=dateStr(year,month,d);
          for(const sh of SHIFTS){
            const available=physicians.filter(p=>
              !(p.daysOff||[]).includes(ds)&&
              isAvailableForSlot(p,ds,sh)&&
              (p.maxShifts||0)>0
            );
            const availCount=available.length;
            const minNeeded=STAFFING[sh].min;
            if(availCount<minNeeded){
              daysOffWarnings.push(`⚠ วันที่ ${d} เวร${SH_SHORT[sh]}: มีคนขอหยุดมากเกินไป แพทย์ไม่พอ (มี ${availCount}/${minNeeded} คน)`);
            } else if(!available.some(p=>isChief(p))){
              daysOffWarnings.push(`⚠ วันที่ ${d} เวร${SH_SHORT[sh]}: ไม่มี Chief (R2/R3) ที่ว่างในวันนี้`);
            }
          }
        }
        if(daysOffWarnings.length>0){
          res.errors=[...(res.errors||[]),...daysOffWarnings];
        }
        setErrors(res.errors);
        const warnN=(res.warnings||[]).length;
        if(res.ok)setGenMsg(warnN?`✓ สร้างตารางเวรสำเร็จ (มี ${warnN} เวรที่ไม่มี Chief)`:"✓ สร้างตารางเวรสำเร็จ");
        else setGenMsg(`⚠ สร้างตารางแล้ว แต่มี ${res.errors.length} ช่วงที่แพทย์ไม่เพียงพอ`);
      }catch(e){setErrors([`เกิดข้อผิดพลาด: ${e.message}`]);}
      finally{setGenerating(false);}
    },80);
  }

  function handleResetManual(){
    if(window.confirm("ล้างการแก้ไขด้วยตนเองทั้งหมด (คงไว้เฉพาะที่ล็อค)?"))
      setAssignments(prev=>prev.map(a=>a.isLocked?a:(a.isManual?{...a,isManual:false}:a)));
  }

  function handleClearAll(){
    if(window.confirm("ล้างตารางเวรทั้งหมดในเดือนนี้?"))
      setAssignments(prev=>prev.filter(a=>!a.date.startsWith(`${year}-${String(month).padStart(2,'0')}`)));
  }

  function exportExcel(){
    const days=daysInMonth(year,month);
    const monthName=MONTHS[month-1];
    const thaiYear=year+543;

    // Build rows: each day may have multiple sub-rows (one per doctor in the largest shift)
    let tableRows="";
    for(let d=1;d<=days;d++){
      const ds=dateStr(year,month,d);
      const isWE=isWeekend(ds);
      const dow=DOW_LABELS[new Date(ds).getDay()];
      const rowBg=isWE?"#fef2f2":"#ffffff";

      // Get doctors per shift
      const shiftDoctors=SHIFTS.map(sh=>
        assignments.filter(a=>a.date===ds&&a.shiftType===sh).map(a=>{
          const p=physicians.find(x=>x.id===a.physicianId);
          if(!p||(p.daysOff||[]).includes(ds))return null;
          return{name:p.name,level:p.level,color:physColor(p.id)};
        }).filter(Boolean)
      );
      const maxRows=Math.max(1,...shiftDoctors.map(s=>s.length));

      // Level background mapping
      const lvBg={R3:"#fef9c3",R2:"#dcfce7",R1:"#dbeafe"};
      const lvFg={R3:"#713f12",R2:"#166534",R1:"#1e40af"};

      for(let r=0;r<maxRows;r++){
        tableRows+="<tr>";
        if(r===0){
          tableRows+=`<td rowspan="${maxRows}" style="background:${rowBg};border:1px solid #ccc;padding:4px 6px;font-weight:bold;font-size:11px;vertical-align:middle;text-align:center;white-space:nowrap;">${d}<br/><span style="font-size:9px;color:#666;font-weight:normal;">${dow}</span></td>`;
        }
        for(const shDoctors of shiftDoctors){
          const doc=shDoctors[r];
          if(doc){
            const bg=lvBg[doc.level]||"#f8fafc";
            const fg=lvFg[doc.level]||"#1e293b";
            tableRows+=`<td style="background:${bg};border:1px solid #ccc;padding:3px 6px;font-size:10px;font-weight:600;color:${fg};vertical-align:middle;">${doc.name}</td>`;
          } else {
            tableRows+=`<td style="background:${rowBg};border:1px solid #ccc;padding:3px;"></td>`;
          }
        }
        tableRows+="</tr>";
      }
    }

    const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"/>
<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
<x:Name>${monthName} ${thaiYear}</x:Name>
<x:WorksheetOptions><x:Panes/></x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>
  body{font-family:"TH Sarabun New",Sarabun,sans-serif;}
  table{border-collapse:collapse;}
  th{background:#e2e8f0;border:1px solid #999;padding:5px 8px;font-size:12px;font-weight:bold;}
</style>
</head><body>
<h2 style="font-family:'TH Sarabun New',Sarabun,sans-serif;font-size:14px;margin:0 0 6px;">
  ตารางเวรแพทย์ ER — ${monthName} ${thaiYear}
</h2>
<table>
<thead>
  <tr>
    <th style="width:50px;">วัน</th>
    <th style="width:160px;background:#bbf7d0;">เวรเช้า (08:00–16:00)</th>
    <th style="width:160px;background:#bfdbfe;">เวรบ่าย (16:00–24:00)</th>
    <th style="width:160px;background:#e9d5ff;">เวรดึก (00:00–08:00)</th>
  </tr>
</thead>
<tbody>${tableRows}</tbody>
</table>
<br/>
<table>
<tr><td style="padding:2px 8px;font-size:10px;background:#fef9c3;border:1px solid #ccc;">R3</td>
<td style="padding:2px 8px;font-size:10px;background:#dcfce7;border:1px solid #ccc;">R2</td>
<td style="padding:2px 8px;font-size:10px;background:#dbeafe;border:1px solid #ccc;">R1</td></tr>
</table>
</body></html>`;

    const blob=new Blob(["﻿"+html],{type:"application/vnd.ms-excel;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`ตารางเวร_${monthName}_${thaiYear}.xls`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }

  const monthPrefix=`${year}-${String(month).padStart(2,'0')}`;
  const thisMonthA=assignments.filter(a=>a.date.startsWith(monthPrefix));
  const manualCount=thisMonthA.filter(a=>a.isManual).length;

  return(
    <div className="p-4">
      {/* Header */}
      <div className="flex flex-wrap items-center gap-2 mb-4">
        <h1 className="text-2xl font-bold text-slate-800 mr-2">ตารางเวร</h1>

        {/* Month selector */}
        <div className="flex items-center gap-0.5 bg-white border border-slate-200 rounded-xl shadow-sm">
          <button type="button" onClick={prevMonth}
            className="px-3 py-2 hover:bg-slate-50 rounded-l-xl font-bold text-slate-500 text-lg transition-colors">‹</button>
          <span className="px-3 font-bold text-slate-700 min-w-[110px] text-center text-sm">
            {MONTHS[month-1]} {year+543}
          </span>
          <button type="button" onClick={nextMonth}
            className="px-3 py-2 hover:bg-slate-50 rounded-r-xl font-bold text-slate-500 text-lg transition-colors">›</button>
        </div>

        <div className="flex-1"/>
        <Btn onClick={handleGenerate} variant="primary" disabled={generating}>
          {generating?"⏳ กำลังสร้าง...":"⚡ สร้างตาราง"}
        </Btn>
        <Btn onClick={exportExcel} variant="secondary">📊 Export Excel</Btn>
        <Btn onClick={handleResetManual} variant="secondary">↺ ล้างแก้ไข</Btn>
        <Btn onClick={handleClearAll} variant="danger">🗑 ล้างเดือนนี้</Btn>
      </div>

      {/* Status messages */}
      {genMsg&&(
        <div className={`mb-3 px-4 py-2.5 rounded-xl text-sm font-semibold border
          ${genMsg.startsWith("✓")
            ?"bg-emerald-50 text-emerald-700 border-emerald-200"
            :"bg-amber-50 text-amber-700 border-amber-200"}`}>
          {genMsg}
        </div>
      )}
      {errors.length>0&&(
        <div className="mb-3 bg-red-50 border border-red-200 rounded-xl p-4">
          <div className="font-bold text-red-700 text-sm mb-2">⛔ ข้อผิดพลาด ({errors.length} รายการ)</div>
          <ul className="list-disc list-inside text-xs text-red-600 space-y-0.5 max-h-36 overflow-y-auto">
            {errors.map((e,i)=><li key={i}>{e}</li>)}
          </ul>
        </div>
      )}

      {/* Stats bar */}
      <div className="flex gap-2 mb-3 flex-wrap">
        <div className="bg-blue-50 border border-blue-200 rounded-lg px-3 py-1.5 text-xs flex items-center gap-1.5">
          <span className="text-blue-400">📅</span>
          <span className="text-blue-600 font-semibold">เวรเดือนนี้:</span>
          <span className="font-bold text-blue-800">{thisMonthA.length}</span>
        </div>
        <div className="bg-green-50 border border-green-200 rounded-lg px-3 py-1.5 text-xs flex items-center gap-1.5">
          <span className="text-green-400">👨‍⚕️</span>
          <span className="text-green-600 font-semibold">แพทย์:</span>
          <span className="font-bold text-green-800">{physicians.length} คน</span>
        </div>
        {manualCount>0&&(
          <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5 text-xs flex items-center gap-1.5">
            <span className="text-amber-500 font-semibold">✏ แก้ไขเอง:</span>
            <span className="font-bold text-amber-800">{manualCount} รายการ</span>
          </div>
        )}
      </div>

      <Card className="overflow-hidden">
        <MonthlyCalendar year={year} month={month} physicians={physicians}
          assignments={assignments} setAssignments={setAssignments}
          activities={activities} setActivities={setActivities}/>
      </Card>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PHYSICIAN VIEW
═══════════════════════════════════════════════ */
function PhysicianView({physicians,year,month,assignments}){
  const [selId,setSelId]=useState("");
  const p=useMemo(()=>physicians.find(x=>x.id===selId),[selId,physicians]);
  const days=daysInMonth(year,month);
  const firstDow=new Date(year,month-1,1).getDay();
  const monthPrefix=`${year}-${String(month).padStart(2,'0')}`;
  const myA=useMemo(()=>assignments.filter(a=>a.physicianId===selId&&a.date.startsWith(monthPrefix)),[selId,assignments,monthPrefix]);

  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const rows=[];
  for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));

  const lvColor={R1:"blue",R2:"green",R3:"yellow"};
  const shiftColors={morning:{bg:"#dbeafe",c:"#1d4ed8"},evening:{bg:"#dcfce7",c:"#166534"},night:{bg:"#ede9fe",c:"#5b21b6"}};

  return(
    <div className="p-4 max-w-3xl mx-auto">
      <h1 className="text-2xl font-bold text-slate-800 mb-4">ตารางเวรรายบุคคล</h1>
      <Card className="p-5 mb-4">
        <Field label="เลือกแพทย์">
          <select value={selId} onChange={e=>setSelId(e.target.value)}
            className="border border-slate-300 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
            <option value="">-- เลือกแพทย์ --</option>
            {physicians.map(ph=><option key={ph.id} value={ph.id}>{ph.name} ({ph.level})</option>)}
          </select>
        </Field>
        {p&&(
          <div className="flex flex-wrap items-center gap-3 pt-2 border-t border-slate-100">
            <div className="flex items-center gap-2">
              <span className="w-4 h-4 rounded-full" style={{backgroundColor:physColor(p.id).bg,border:`2px solid ${physColor(p.id).bd}`}}/>
              <span className="font-bold text-slate-800">{p.name}</span>
            </div>
            <Badge color={lvColor[p.level]}>{p.level}</Badge>
            <Badge color="purple">{p.rotation||"วนนอก"}</Badge>
            <div className="flex gap-3 ml-auto text-sm">
              <span className="text-slate-500">เวรเดือนนี้: <strong className="text-blue-700">{myA.length}</strong></span>
              <span className="text-slate-500">Target: <strong>{p.targetShifts}</strong></span>
              <span className={`font-semibold ${myA.length>=p.targetShifts?"text-green-600":"text-amber-600"}`}>
                {myA.length>=p.targetShifts?"✓ ครบ":"ยังไม่ครบ"}
              </span>
            </div>
          </div>
        )}
      </Card>

      {p&&(
        <Card className="overflow-hidden">
          <div className="grid grid-cols-7 bg-slate-50 border-b border-slate-200">
            {DOW_LABELS.map((d,i)=>(
              <div key={d} className={`text-center py-2 text-xs font-bold ${i===0||i===6?"text-red-500":"text-slate-500"}`}>{d}</div>
            ))}
          </div>
          {rows.map((row,ri)=>(
            <div key={ri} className="grid grid-cols-7">
              {row.map((d,ci)=>{
                if(!d)return<div key={ci} className="border-r border-b border-slate-200 bg-slate-50/60" style={{minHeight:90}}/>;
                const ds=dateStr(year,month,d);
                const dayA=myA.filter(a=>a.date===ds&&!(p.daysOff||[]).includes(ds));
                const isOff=(p.daysOff||[]).includes(ds);
                const isWE=isWeekend(ds);
                const hasWork=dayA.length>0;
                return(
                  <div key={ci}
                    className={`border-r border-b border-slate-200 p-2 ${isOff?"bg-red-50":hasWork?"bg-blue-50/40":isWE?"bg-rose-50/20":"bg-white"}`}
                    style={{minHeight:90}}>
                    <div className={`text-xs font-bold mb-1 ${isWE?"text-red-400":"text-slate-700"}`}>{d}</div>
                    {isOff&&<div className="text-xs text-red-500 font-bold bg-red-100 rounded px-1">หยุด</div>}
                    {dayA.map(a=>(
                      <div key={a.id} className="text-xs font-bold px-1 py-0.5 rounded mb-0.5 text-center"
                        style={{background:shiftColors[a.shiftType].bg,color:shiftColors[a.shiftType].c}}>
                        {SH_SHORT[a.shiftType]}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          ))}
        </Card>
      )}

      {!selId&&(
        <Card className="p-12 text-center">
          <div className="text-5xl mb-3">🗓</div>
          <div className="text-slate-500">เลือกแพทย์เพื่อดูตารางเวรรายบุคคล</div>
        </Card>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════ */
function Dashboard({physicians,year,month,assignments,activities}){
  const days=daysInMonth(year,month);
  const monthPrefix=`${year}-${String(month).padStart(2,'0')}`;
  const yearPrefix=`${year}-`;
  const physMapD=useMemo(()=>Object.fromEntries(physicians.map(p=>[p.id,p])),[physicians]);
  const monthA=useMemo(()=>assignments.filter(a=>{const p=physMapD[a.physicianId];return a.date.startsWith(monthPrefix)&&(!p||!(p.daysOff||[]).includes(a.date));}),[assignments,monthPrefix,physMapD]);
  const yearA=useMemo(()=>assignments.filter(a=>{const p=physMapD[a.physicianId];return a.date.startsWith(yearPrefix)&&(!p||!(p.daysOff||[]).includes(a.date));}),[assignments,yearPrefix,physMapD]);
  const total=monthA.length;
  const avg=physicians.length?(Math.round(total/physicians.length*10)/10):0;

  const firstDow=new Date(year,month-1,1).getDay();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const lvColor={R1:"blue",R2:"green",R3:"yellow"};

  return(
    <div className="p-4 max-w-6xl mx-auto">
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-2xl font-bold text-slate-800">แดชบอร์ด</h1>
        <Badge color="slate">{MONTHS[month-1]} {year+543}</Badge>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-3 gap-4 mb-6">
        <Card className="p-5 text-center">
          <div className="text-4xl font-black text-blue-600 mb-1">{physicians.length}</div>
          <div className="text-sm text-slate-500 font-medium">แพทย์ทั้งหมด</div>
        </Card>
        <Card className="p-5 text-center">
          <div className="text-4xl font-black text-emerald-600 mb-1">{total}</div>
          <div className="text-sm text-slate-500 font-medium">เวรทั้งหมดเดือนนี้</div>
        </Card>
        <Card className="p-5 text-center">
          <div className="text-4xl font-black text-violet-600 mb-1">{avg}</div>
          <div className="text-sm text-slate-500 font-medium">เฉลี่ยเวร/คน</div>
        </Card>
      </div>

      {physicians.length===0&&(
        <Card className="p-12 text-center text-slate-400">
          <div className="text-5xl mb-3">📊</div>
          <div>ยังไม่มีข้อมูลแพทย์</div>
        </Card>
      )}

      {/* Per physician grid */}
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {physicians.map(p=>{
          const pa=monthA.filter(a=>a.physicianId===p.id);
          const ya=yearA.filter(a=>a.physicianId===p.id);
          const morn=pa.filter(a=>a.shiftType==="morning").length;
          const even=pa.filter(a=>a.shiftType==="evening").length;
          const nigh=pa.filter(a=>a.shiftType==="night").length;
          const daysOff=(p.daysOff||[]).filter(d=>d.startsWith(monthPrefix)).length;
          const free=Math.max(0,days-pa.length-daysOff);
          const col=physColor(p.id);
          const pct=p.targetShifts?Math.min(100,Math.round(pa.length/p.targetShifts*100)):0;
          return(
            <Card key={p.id} className="p-4">
              <div className="flex items-center gap-2 mb-3">
                <span className="w-4 h-4 rounded-full flex-shrink-0 shadow"
                  style={{backgroundColor:col.bg,border:`2px solid ${col.bd}`}}/>
                <span className="font-bold text-slate-800 flex-1 text-sm truncate">{p.name}</span>
                <Badge color={lvColor[p.level]}>{p.level}</Badge>
                <Badge color="purple">{ROT_SHORT[p.rotation||"วนนอก"]}</Badge>
              </div>

              {/* Shift type breakdown — เช้า/บ่าย/ดึก */}
              <div className="grid grid-cols-3 gap-1.5 mb-2">
                {[["เช้า","#2563eb","#dbeafe",morn],["บ่าย","#16a34a","#dcfce7",even],["ดึก","#7c3aed","#ede9fe",nigh]].map(([label,fg,bg,cnt])=>(
                  <div key={label} className="rounded-lg p-2 text-center" style={{background:bg,border:`1px solid ${fg}30`}}>
                    <div className="text-lg font-black" style={{color:fg}}>{cnt}</div>
                    <div className="text-xs font-bold" style={{color:fg}}>{label}</div>
                  </div>
                ))}
              </div>

              {/* Month total + yearly cumulative */}
              <div className="grid grid-cols-3 gap-1.5 mb-3">
                <div className="bg-slate-50 rounded-lg p-2 text-center col-span-1">
                  <div className="text-base font-black text-slate-700">{pa.length}</div>
                  <div className="text-xs text-slate-500">เดือนนี้</div>
                </div>
                <div className="bg-red-50 rounded-lg p-2 text-center">
                  <div className="text-base font-black text-red-700">{daysOff}</div>
                  <div className="text-xs text-red-500">หยุด</div>
                </div>
                <div className="rounded-lg p-2 text-center" style={{background:"#fef9c3"}}>
                  <div className="text-base font-black" style={{color:"#713f12"}}>{ya.length}</div>
                  <div className="text-xs font-bold" style={{color:"#92400e"}}>ปี {year+543}</div>
                </div>
              </div>

              {/* Progress bar */}
              <div className="mb-3">
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-slate-500">เดือนนี้ vs target</span>
                  <span className="font-semibold" style={{color:col.bg}}>{pa.length}/{p.targetShifts}</span>
                </div>
                <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all"
                    style={{width:`${pct}%`,backgroundColor:col.bg}}/>
                </div>
              </div>

              {/* Mini calendar */}
              <div className="grid grid-cols-7 gap-px">
                {["อ","จ","อ","พ","พ","ศ","ส"].map((d,i)=>(
                  <div key={i} style={{fontSize:6,textAlign:"center",color:"#94a3b8",fontWeight:700}}>{DOW_LABELS[i]}</div>
                ))}
                {cells.map((d,i)=>{
                  if(!d)return<div key={i} style={{aspectRatio:"1",borderRadius:2}}/>;
                  const ds=dateStr(year,month,d);
                  const hasShift=monthA.some(a=>a.physicianId===p.id&&a.date===ds);
                  const isDayOff=(p.daysOff||[]).includes(ds);
                  const isWE=isWeekend(ds);
                  let bg="#f1f5f9",tc="#94a3b8";
                  if(hasShift){bg=col.bg;tc=col.fg;}
                  else if(isDayOff){bg="#fecaca";tc="#b91c1c";}
                  else if(isWE){bg="#fee2e2";tc="#fca5a5";}
                  return(
                    <div key={i} title={ds}
                      style={{aspectRatio:"1",background:bg,color:tc,fontSize:6,fontWeight:700,
                        textAlign:"center",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {d}
                    </div>
                  );
                })}
              </div>
              {/* Legend */}
              <div className="flex gap-3 mt-2">
                {[{bg:col.bg,label:"เวร"},{bg:"#fecaca",label:"หยุด"},{bg:"#f1f5f9",label:"ว่าง"}].map(({bg,label})=>(
                  <span key={label} className="flex items-center gap-1">
                    <span style={{width:8,height:8,borderRadius:2,display:"inline-block",backgroundColor:bg}}/>
                    <span style={{fontSize:8,color:"#94a3b8"}}>{label}</span>
                  </span>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   DEFAULT PHYSICIANS (pre-seeded from rotation schedule)
   ER ปก = วนใน | other dept = วนนอก | ER ปก/Xray = วนนอกครึ่งเดือนหลัง
═══════════════════════════════════════════════ */
const DEFAULT_PHYSICIANS=[
  {id:"p1", name:"อภิญญา",    level:"R3", rotation:"วนใน", minShifts:21, targetShifts:23, maxShifts:26, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p2", name:"ธนวัฒน์",   level:"R3", rotation:"วนใน", minShifts:21, targetShifts:23, maxShifts:26, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p3", name:"เปมิกา",    level:"R2", rotation:"วนใน", minShifts:22, targetShifts:24, maxShifts:27, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p4", name:"ชนิกานต์",  level:"R2", rotation:"วนใน", minShifts:22, targetShifts:24, maxShifts:27, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p5", name:"พิมพ์ลดา",  level:"R2", rotation:"วนใน", minShifts:22, targetShifts:24, maxShifts:27, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p6", name:"จิรพนธ์",   level:"R2", rotation:"วนใน", minShifts:22, targetShifts:24, maxShifts:27, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p7", name:"มาะ",        level:"R2", rotation:"วนใน",  minShifts:22, targetShifts:24, maxShifts:27, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["morning","evening","night"]},
  {id:"p8", name:"ปานตะวัน",  level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
  {id:"p9", name:"ไชยวัฒน์",  level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
  {id:"p10",name:"ปภัสรา",    level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
  {id:"p11",name:"ภูมิ",      level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
  {id:"p12",name:"นรินทร์",   level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
  {id:"p13",name:"กฤษณปณต",  level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
  {id:"p14",name:"ศุภรพัชร์", level:"R1", rotation:"วนนอก", minShifts:5,  targetShifts:7,  maxShifts:10, offDays:[], daysOff:[], shiftsOff:[], preferredShifts:["evening"]},
];

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
function App(){
  const now=new Date();
  const [page,setPage]=useState("schedule");
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth()+1);
  // Clear stale localStorage when file version changes
  const _isNewVersion=loadLS("erpk_version",null)!==LS_VERSION;
  if(_isNewVersion){
    saveLS("erpk_version",LS_VERSION);
    saveLS("erpk_physicians",[]);
    saveLS("erpk_assignments",[]);
  }
  const [physicians,setPhysicians]=useState(()=>{
    const saved=loadLS("erpk_physicians",null);
    if(!saved||saved.length===0)return DEFAULT_PHYSICIANS;
    return dedupePhysByName(saved);
  });
  const [assignments,setAssignments]=useState(()=>_isNewVersion?[]:loadLS("erpk_assignments",[]));
  // Build unique color map whenever physicians list changes (guarantees no duplicate colors)
  useMemo(()=>buildColorMap(physicians),[physicians]);
  const [activities,setActivities]=useState(()=>{ try{return JSON.parse(localStorage.getItem("erpk_activities_v11")||"[]")}catch{return []} });
  const [loading,setLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState("idle"); // "idle"|"saving"|"saved"|"error"

  // ── SINGLE SOURCE OF TRUTH for daysOff filtering ──────────────────────────
  // All display components receive safeAssignments (never raw assignments).
  // This is the ultimate guard: no matter where a violation enters state
  // (cloud sync, localStorage, generator edge-case), it is invisible to the UI.
  const _physById=useMemo(()=>Object.fromEntries(physicians.map(p=>[p.id,p])),[physicians]);
  const safeAssignments=useMemo(()=>
    // Drop shifts of deleted doctors (orphans, incl. removed duplicates) AND any shift
    // on that doctor's requested day off — nothing else ever reaches the UI or storage.
    assignments.filter(a=>{const p=_physById[a.physicianId];return !!p&&!(p.daysOff||[]).includes(a.date);}),
  [assignments,_physById]);

  useEffect(()=>saveLS("erpk_physicians",physicians),[physicians]);
  // Save safeAssignments (not raw) so localStorage/cloud never accumulates daysOff violations
  useEffect(()=>saveLS("erpk_assignments",safeAssignments),[safeAssignments]);
  React.useEffect(()=>{ localStorage.setItem("erpk_activities_v11", JSON.stringify(activities)); }, [activities]);

  useEffect(() => {
    async function loadFromCloud() {
      if (!SCRIPT_URL) { setLoading(false); return; }
      try {
        const [cp, ca, cact] = await Promise.all([
          cloudGet('physicians'),
          cloudGet('assignments'),
          cloudGet('activities'),
        ]);
        // Merge physicians by NAME, local edits first. A doctor deleted-and-re-added
        // locally gets a new id; matching by id alone resurrects the stale cloud copy
        // as a duplicate (e.g. two อภิญญา — one with the day-off, one without, and the
        // old one keeps getting scheduled). Name-based dedupe keeps exactly one record
        // per doctor, preferring the local one that carries the freshest daysOff.
        const localList = physicians; // from localStorage at mount — freshest edits
        const allKnown = [...localList, ...(cp||[]), ...DEFAULT_PHYSICIANS];
        const physList = dedupePhysByName(allKnown);
        const physByIdC = Object.fromEntries(physList.map(p=>[p.id,p]));
        setPhysicians(physList); saveLS('erpk_physicians', physList);
        if (cp && cp.length > 0) cloudSet('physicians', physList); // overwrite stale cloud list
        if (ca && ca.length > 0) {
          // Re-point shifts from removed duplicate ids to the surviving doctor,
          // then strip anything that conflicts with that doctor's daysOff.
          const remapped = remapAssignments(ca, allKnown, physList);
          const cleanCa = remapped.filter(a=>{ const p=physByIdC[a.physicianId]; return !p||!(p.daysOff||[]).includes(a.date); });
          setAssignments(cleanCa); saveLS('erpk_assignments', cleanCa);
          cloudSet('assignments', cleanCa); // push cleaned schedule back so stale rows die for good
        }
        if (cact && cact.length > 0) { setActivities(cact); saveLS('erpk_activities_v11', cact); }
      } catch {}
      setLoading(false);
    }
    loadFromCloud();
  }, []);

  const isFirstRender = useRef(true);
  useEffect(() => {
    if (loading) return;
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    // Always persist a de-duplicated, day-off-merged physician list so duplicate
    // records can never propagate back into localStorage or the cloud.
    const cleanPhys = dedupePhysByName(physicians);
    saveLS('erpk_physicians', cleanPhys);
    saveLS('erpk_assignments', safeAssignments);
    // cloud save debounced
    setSyncStatus('saving');
    const t = setTimeout(async () => {
      try {
        await Promise.all([
          cloudSet('physicians', cleanPhys),
          cloudSet('assignments', safeAssignments),
          cloudSet('activities', activities),
        ]);
        setSyncStatus('saved');
        setTimeout(() => setSyncStatus('idle'), 3000);
      } catch {
        setSyncStatus('error');
      }
    }, 2000);
    return () => clearTimeout(t);
  }, [physicians, assignments, activities]);

  const NAV=[
    {id:"schedule",icon:"📅",label:"ตารางเวร"},
    {id:"physicians",icon:"👨‍⚕️",label:"แพทย์"},
    {id:"physicianview",icon:"👤",label:"รายบุคคล"},
    {id:"dashboard",icon:"📊",label:"แดชบอร์ด"},
  ];

  if (loading && SCRIPT_URL) {
    return (
      <div className="min-h-screen bg-slate-100 flex items-center justify-center">
        <div className="text-center">
          <div className="text-4xl mb-4">⏳</div>
          <div className="text-slate-600 font-semibold">กำลังโหลดข้อมูลจาก Cloud...</div>
        </div>
      </div>
    );
  }

  return(
    <div className="min-h-screen bg-slate-100">
      {/* Navigation */}
      <nav className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div className="max-w-screen-2xl mx-auto px-4 flex items-center h-14 gap-1">
          {/* Logo */}
          <div className="flex items-center gap-2 mr-4 flex-shrink-0">
            <span className="text-2xl">🏥</span>
            <span className="font-black text-blue-700 text-lg tracking-tight">ERPK</span>
            <span className="text-xs text-slate-400 font-medium hidden sm:block">ระบบจัดเวรแพทย์</span>
          </div>

          {/* Nav tabs */}
          <div className="flex gap-1 flex-1 overflow-x-auto">
            {NAV.map(n=>(
              <button key={n.id} type="button" onClick={()=>setPage(n.id)}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold whitespace-nowrap transition-all
                  ${page===n.id
                    ?"bg-blue-600 text-white shadow-sm"
                    :"text-slate-600 hover:bg-slate-100 hover:text-slate-800"}`}>
                <span>{n.icon}</span>
                <span className="hidden sm:inline">{n.label}</span>
              </button>
            ))}
          </div>

          {/* Month badge */}
          <div className="flex-shrink-0 text-xs text-slate-400 font-medium ml-2 hidden md:block px-2 py-1 bg-slate-50 border border-slate-200 rounded-lg">
            {MONTHS[month-1]} {year+543}
          </div>

          {SCRIPT_URL && (
            <div className="flex-shrink-0 text-xs ml-2 px-2 py-1 rounded-lg border"
              style={syncStatus==='saving'
                ? {background:'#fef9c3',borderColor:'#fde047',color:'#713f12'}
                : syncStatus==='saved'
                ? {background:'#dcfce7',borderColor:'#86efac',color:'#166534'}
                : syncStatus==='error'
                ? {background:'#fee2e2',borderColor:'#fca5a5',color:'#991b1b'}
                : {background:'#f8fafc',borderColor:'#e2e8f0',color:'#94a3b8'}}>
              {syncStatus==='saving' ? '⏳ กำลัง sync...'
               : syncStatus==='saved' ? '✓ sync แล้ว'
               : syncStatus==='error' ? '⚠ sync ผิดพลาด'
               : '☁ cloud'}
            </div>
          )}
          {/* Reset: clear stale local + cloud assignment cache that may pre-date daysOff fixes */}
          <button type="button"
            onClick={async()=>{
              if(!window.confirm('ล้างตารางเวรทั้งหมด (เวรที่จัดไว้) ออกจากเครื่องและ cloud?\nรายชื่อแพทย์และวันหยุดจะยังอยู่ครบ'))return;
              setAssignments([]);
              saveLS('erpk_assignments',[]);
              try{ if(SCRIPT_URL) await cloudSet('assignments',[]); }catch{}
              window.location.reload();
            }}
            className="flex-shrink-0 text-xs ml-2 px-2 py-1 rounded-lg border border-red-200 bg-red-50 text-red-600 hover:bg-red-100 font-semibold transition-colors">
            🔄 ล้างเวรเก่า
          </button>
        </div>
      </nav>

      {/* Page */}
      <main className="max-w-screen-2xl mx-auto">
        {page==="schedule"&&(
          <SchedulePage physicians={physicians} year={year} month={month}
            setYear={setYear} setMonth={setMonth}
            assignments={safeAssignments} setAssignments={setAssignments}
            activities={activities} setActivities={setActivities}/>
        )}
        {page==="physicians"&&(
          <PhysiciansPage physicians={physicians} setPhysicians={setPhysicians}
            year={year} month={month} assignments={assignments} setAssignments={setAssignments}/>
        )}
        {page==="physicianview"&&(
          <PhysicianView physicians={physicians} year={year} month={month}
            assignments={safeAssignments}/>
        )}
        {page==="dashboard"&&(
          <Dashboard physicians={physicians} year={year} month={month}
            assignments={safeAssignments} activities={activities}/>
        )}
      </main>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
